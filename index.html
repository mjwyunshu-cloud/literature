                { text: "暴力反抗：必须炸开这个死循环，即便代价惨重", target: "KAFKA", ref: "极端的重启。在系统的长期死机状态里，你选择通过一个突破底线的动作，来证明主体性还没被格式化。" },

            { id: 19, origin: "莫里森《宠儿》", background: "通过“找回名字”的过程修复尊严。", text: "面对被刻意抹去的、沉重的历史伤痕，你会？", reading: "《所罗门之歌》", options: [

            { id: 20, origin: "阿特伍德《末世观察》", background: "文明脆弱的边界。", text: "秩序即将崩塌，此时你最想为自己做的一件事是？", reading: "《盲刺客》", options: [

                { text: "大笑一两声：这荒唐的剧终于谢幕了，废墟极美", target: "KAFKA", ref: "荒诞的看客。在秩序彻底坍缩的瞬间，你终于感到那份异化带来的沉重枷锁被卸下了，废墟让你感到自由。" },

            ] },
            { id: 30, origin: "灵魂圣器转录逻辑", background: "创作是将意识物化为具有特定精神指向的圣器。", text: "如果你一生的意识最后成了一件圣器，哪件最能代表你的本质？", reading: "《虚构集》", options: [
                { text: "一把剖开伪善与假面的利刃", target: "KAFKA", ref: "解剖的真实。你这一生都在致力于刺破系统的虚伪外壳，这种带刺的真实感是你活过最确凿的证据。" },
                { text: "一架能看清星体运行轨迹的望远镜", target: "BORGES", ref: "观测的智慧。你将宇宙视为一组完美的编码，你试图在繁复的星图中捕捉上帝的指纹，你因这种观测而神圣。" },
                { text: "一个装满了晚霞的墨水瓶", target: "WOOLF", ref: "感知的沉淀。认为所有流逝的瞬间都应当被转化为具有颤动感的文学灰烬，那是你用来抗衡时间的唯一容器。" },
                { text: "一张永远折叠不完的灵魂地图", target: "CAMUS", ref: "自由的无疆。它象征着一个永远在超越、永远拒绝被终点定义的灵魂，你每一刻都在重新发现自己的疆域。" }
            ] }
        ];

        const JarIllustration = () => (
            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm">
                <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke={COLORS.textMain} strokeWidth="1.5" />
                <path d="M160 110 L240 110" stroke={COLORS.textMain} strokeWidth="1" />
                <g transform="translate(180, 210)">
                    <circle cx="20" cy="20" r="8" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                    <path d="M20 28 Q 20 55 10 75 M20 28 Q 20 55 30 75" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                    <path d="M12 45 Q 20 40 28 45" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                </g>
                <circle cx="330" cy="110" r="4" fill={COLORS.textMain} />
                <circle cx="350" cy="55" r="28" fill={COLORS.accentYellow} opacity="0.35" />
                <rect x="45" y="245" width="45" height="45" rx="22" fill={COLORS.accentGreen} opacity="0.25" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({ KAFKA:0, CAMUS:0, LISPECTOR:0, BORGES:0, HEMINGWAY:0, WOOLF:0, EILEEN_CHANG:0, CHRISTIE:0, MORRISON:0, ATWOOD:0, PROUST:0, SAGAN:0, DICKINSON:0, BEAUVOIR:0, PLATH:0, JOYCE:0, HESSE:0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [code, setCode] = useState("");
            const [showError, setShowError] = useState(false);
            const [selectedIdx, setSelectedIdx] = useState(null);
            
            const [dynamicStats, setDynamicStats] = useState({ qualia: 0, logic: 0, rebellion: 0, awakening: 0 });

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            const handleVerify = () => { if (code.toLowerCase().trim() === "cloud") setStep('quiz'); else { setShowError(true); setTimeout(() => setShowError(false), 500); } };
            
            const handleSelect = (idx) => {
                setSelectedIdx(idx);
            };

            const handleNext = () => {
                const target = QUESTIONS[currentQuestion].options[selectedIdx].target;
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores: { ...scores }, currentQuestion, selectedIdx: null }]);
                setScores(newScores);
                setSelectedIdx(null);

                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    window.scrollTo(0, 0);
                } else {
                    const topTarget = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    const resData = Object.assign({}, ARCHETYPES[topTarget] || ARCHETYPES.KAFKA, { key: topTarget });
                    
                    const qualiaScore = (newScores.WOOLF || 0) + (newScores.LISPECTOR || 0) + (newScores.EILEEN_CHANG || 0) + (newScores.PROUST || 0);
                    const logicScore = (newScores.BORGES || 0) + (newScores.CHRISTIE || 0) + (newScores.JOYCE || 0);
                    const rebellionScore = (newScores.KAFKA || 0) + (newScores.CAMUS || 0) + (newScores.HEMINGWAY || 0);
                    
                    const qualiaPct = Math.min(95, Math.max(30, (qualiaScore / 8) * 100 + (Math.random() * 15)));
                    const logicPct = Math.min(95, Math.max(30, (logicScore / 6) * 100 + (Math.random() * 15)));
                    const rebellionPct = Math.min(95, Math.max(30, (rebellionScore / 10) * 100 + (Math.random() * 15)));
                    const awakening = 88 + (qualiaPct + logicPct + rebellionPct) / 30;

                    setDynamicStats({ qualia: Math.round(qualiaPct), logic: Math.round(logicPct), rebellion: Math.round(rebellionPct), awakening: awakening.toFixed(1) });
                    setResult(resData);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentQuestion(last.currentQuestion); setSelectedIdx(null); setHistory([...history]); } else { setStep('welcome'); } };
            const handleRestart = () => { setStep('welcome'); setCurrentQuestion(0); setScores({}); setHistory([]); setResult(null); setCode(""); setSelectedIdx(null); window.scrollTo(0, 0); };

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `文学报告-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['批判逻辑', '智性深度', '审美欲', '自由意志', '精神韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(53, 175, 203, 0.12)',
                                borderColor: COLORS.accentBlue,
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(0,0,0,0.05)' },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    pointLabels: { font: { size: 10, family: 'Noto Serif SC', weight: 'bold' }, color: COLORS.textSecondary },
                                    ticks: { display: false },
                                    min: 0, max: 100
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#35afcb] text-white text-[9px] tracking-widest font-sans mb-4 transform -rotate-2 uppercase">Archetypal Assessment</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-[#3a3833]">寻找你的<br /><span className="font-bold border-b-4 border-[#e8ed2a]">文学原型</span></h1>
                            </div>
                            <div className="w-full max-w-[340px] mx-auto aspect-[4/3.5] relative opacity-80">
                                <JarIllustration />
                            </div>
                            <div className="space-y-10">
                                <div className="space-y-4 px-4 text-left border-l-2 border-[#e8ed2a] pl-4">
                                    <p className="text-[13px] text-[#3a3833] leading-relaxed font-bold tracking-widest underline decoration-[#e8ed2a] decoration-4 underline-offset-4">基于文学宗师的精神切片，进行一次关于“人性临界处”的行为测绘。</p>
                                    <p className="text-xs text-[#6d6b64] leading-relaxed tracking-wider font-light italic">“文学并非修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={`space-y-4 ${showError ? 'shake' : ''}`}>
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold font-sans">通行码认证 / ACCESS CODE</span>
                                        <input type="text" value={code} onChange={(e) => setCode(e.target.value)} className="redeem-input w-48 py-2 text-sm text-center" placeholder="请输入通行码解锁测试" />
                                    </div>
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#3a3833] text-white text-[11px] tracking-[0.8em] font-bold active:scale-95 transition-all shadow-xl text-center">开启审视 / START</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em] font-sans text-center">Arché 思想铺子实验室出品</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10 text-center">
                            <div className="flex justify-between items-center border-b border-[#dcd8cf] pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest">BACK</button>
                                <span className="text-[9px] uppercase text-[#6d6b64] font-black tracking-widest opacity-40">COORDINATE {String(currentQuestion + 1).padStart(2, '0')} / {QUESTIONS.length}</span>
                                <div className="w-10"></div>
                            </div>
                            
                            <div className="w-full text-left bg-[#3a383308] p-6 border-l-4 border-[#3a383333]">
                                <div className="flex items-baseline gap-2 mb-3">
                                    <span className="text-[10px] font-bold bg-[#3a3833] text-white px-2 py-0.5 rounded-sm font-sans whitespace-nowrap uppercase">文学背景</span>
                                    <span className="text-[13px] font-bold opacity-80">{QUESTIONS[currentQuestion].origin}</span>
                                </div>
                                <p className="text-[12px] leading-relaxed text-[#a4c29b] mb-3 font-medium italic opacity-80">“{QUESTIONS[currentQuestion].background}”</p>
                                <div className="flex items-baseline gap-2 pt-2 border-t border-[#3a383315]">
                                    <span className="text-[8px] font-bold border border-[#3a383333] px-1.5 py-0.5 uppercase opacity-50 font-sans tracking-widest">核心论题</span>
                                    <span className="text-[10px] opacity-40 font-medium">{QUESTIONS[currentQuestion].reading}</span>
                                </div>
                            </div>

                            <h2 className="text-[19px] md:text-[22px] font-bold leading-[1.6] text-[#3a3833] text-left border-t border-[#dcd8cf] pt-6 tracking-tight">
                                {QUESTIONS[currentQuestion].text}
                            </h2>

                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                    <div key={idx} onClick={() => handleSelect(idx)} className={`option-card p-6 rounded-sm ${selectedIdx === idx ? 'selected' : selectedIdx !== null ? 'dimmed' : ''}`}>
                                        <div className="flex flex-col">
                                            <span className="text-[15px] text-[#3a3833] font-bold leading-relaxed">{option.text}</span>
                                            <div className="ref-box">
                                                <span className="text-[12px] text-[#6d6b64] font-light leading-relaxed block italic text-left">
                                                    Ref: {option.ref}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className={`pt-8 ${selectedIdx !== null ? 'btn-confirm visible' : 'btn-confirm'}`}>
                                <button onClick={handleNext} className="w-full py-5 bg-[#3a3833] text-white text-[11px] tracking-[0.5em] font-bold active:scale-95 transition-all shadow-lg rounded-sm uppercase">
                                    确认并继续 / Confirm & Continue →
                                </button>
                            </div>
                            
                            <div className="pt-10 flex justify-center">
                                <div className="h-[1px] w-full bg-[#dcd8cf] relative opacity-50">
                                    <div className="h-full bg-[#3a3833] transition-all duration-700" style={{ width: `${((currentQuestion + 1) / QUESTIONS.length) * 100}%` }}></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#f2f0e9]">
                                <div className="text-center space-y-6 py-12 bg-white border border-[#dcd8cf] rounded-sm shadow-sm relative overflow-hidden">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#35afcb] font-sans text-center block">Literature Archetype Profile</span>
                                    <h2 className="text-5xl font-bold text-[#3a3833] tracking-widest text-center">{result.name}</h2>
                                    <p className="text-sm text-[#35afcb] italic tracking-[0.4em] font-sans text-center">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4">
                                        <span className="px-3 py-1 border border-[#3a3833] text-[9px] font-bold uppercase font-sans tracking-widest">思辨觉醒度 {dynamicStats.awakening}%</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[9px] font-bold uppercase font-sans tracking-widest">主体性存证</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl relative text-left">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-white border border-[#3a3833] text-[10px] font-bold transform rotate-3 shadow-sm font-sans uppercase">NO. 2026-SOUL</div>
                                    <div className="space-y-4 font-sans text-left">
                                        <h4 className="text-[11px] font-bold border-b pb-2 italic tracking-widest">叙事基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-3 text-[10px]">
                                            <div className="flex justify-between items-center uppercase"><span>感质驱动</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#e8ed2a] transition-all duration-1000" style={{width: `${dynamicStats.qualia}%`}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>理式逻辑</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#35afcb] transition-all duration-1000" style={{width: `${dynamicStats.logic}%`}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>反叛意志</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-black transition-all duration-1000" style={{width: `${dynamicStats.rebellion}%`}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto text-center">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                </div>

                                <div className="relative p-12 bg-white border border-[#dcd8cf] text-center shadow-sm">
                                    <p className="text-xl md:text-2xl leading-relaxed mb-6 font-medium italic text-[#3a3833] text-center"><span className="highlight-yellow">“{result.quote}”</span></p>
                                    <div className="text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold font-sans text-center">— {result.name} —</div>
                                </div>

                                <div className="space-y-10 px-2 text-left font-sans">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans tracking-widest">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-4 border-[#35afcb] space-y-5 text-left">
                                            <div>
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-widest">文学原型界定</span>
                                                <p className="text-[13px] leading-relaxed text-[#6d6b64] italic font-bold">“{result.identity}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4 text-left">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">写作建议 (Writing Advice)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#d14d42] bg-red-50 p-3 rounded-sm italic">“{result.writing}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4 text-left">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">临床症候分析 (Symptom)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.symptom}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4 text-left">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">主体性指引 (Counsel)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#35afcb]">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4 text-left font-sans">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 tracking-widest">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-red-50 border border-red-100 rounded text-left">
                                                <div className="font-bold mb-1 uppercase tracking-widest text-red-700">核心焦虑</div>
                                                <div className="opacity-70 font-sans">{result.anxiety}</div>
                                            </div>
                                            <div className="p-4 bg-gray-50 border border-gray-100 rounded text-left">
                                                <div className="font-bold mb-1 uppercase tracking-widest">意识阴影</div>
                                                <div className="opacity-70 font-sans">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans tracking-widest text-left">思想进阶书单推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="bg-white p-6 border border-[#dcd8cf] relative group shadow-sm text-left font-sans transition-all hover:bg-gray-50 rounded-xl">
                                                    <h5 className="text-[15px] font-bold mb-1">{book.title}</h5>
                                                    <p className="text-[10px] text-[#a4c29b] font-bold mb-2 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-[#6d6b64] italic leading-relaxed opacity-80">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] flex items-center justify-center gap-3 shadow-xl active:bg-gray-800 disabled:opacity-50 transition-all font-sans rounded-sm text-center">{isSaving ? "生成报告中..." : "保存灵魂手稿报告 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all font-sans active:scale-95 text-center">再次重启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4">
                        <div className="lab-signature flex flex-col items-center text-center">
                            <div className="text-[8px] text-[#999] tracking-[0.2em] uppercase mb-1 font-sans">A Digital Narrative Lab</div>
                            <div className="text-[12px] font-bold text-[#3a3833] tracking-[0.1em] border-b-2 border-[#3a3833] pb-0.5 px-1 font-sans">Arché 思想铺子</div>
                        </div>
                        <p className="text-[9px] tracking-[0.3em] uppercase text-[#6d6b64] opacity-40 font-sans mt-4 italic text-center">为精神生长提供坐标 / Mapping Mental Growth</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
