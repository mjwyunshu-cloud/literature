            { id: 4, origin: "文体实验室", reading: "文体反抗", desc: "文体本身就是权力话语。你的偏好暴露了你舒适的防御姿态。", readingLabel: "表达主权分析", text: "如果文字真的有阶级。你认为最高的文体应该更接近哪种状态？", annotation: "客观反映问题还是武器刺入？文体偏好决定了你如何与世界博弈。", options: [

            { id: 5, origin: "地基探测", reading: "物理形态", desc: "废墟、迷宫还是审判室？你对环境的本能定义决定了逻辑。", readingLabel: "世界观锚定", text: "你认为这个世界的真相，更接近于哪种物理形态？", annotation: "世界观决定了你如何面对那些突如其来的崩解时刻。", options: [

            { id: 6, origin: "力量模型", reading: "意志状态", desc: "挺立、生长、燃烧还是奔涌？指向不同的精神韧度。", readingLabel: "生命意志分析", text: "你认为最能体现生命力量的状态是：", annotation: "意志状态决定了你在命运面前的站姿。", options: [

                { text: "彻底跳入。不再作为被叙述的角色存在。", target: "WOOLF" }
            ] },
            { id: 27, origin: "利奥塔", reading: "终极注脚", desc: "宏大叙事失效。你如何留存最后的痕迹？", readingLabel: "存证词探测", text: "你会为终结的历史留下哪一个词作为注脚？", annotation: "保留那份模糊，人类内心的真诚才不会被蒸发。", options: [
                { text: "“但是” —— 永远代表着反抗与转折的可能。", target: "KAFKA" },
                { text: "“因为” —— 守住因果律与逻辑的最后底线。", target: "BORGES" },
                { text: "“也许” —— 为冰冷世界保留朦胧的审美。", target: "WOOLF" },
                { text: "“再会” —— 预示着在另一个地平线上启程。", target: "CAMUS" }
            ] },
            { id: 28, origin: "行李哲学", reading: "流浪意志", desc: "不带行李走向荒原。追求答案是对自我的阉割。", readingLabel: "主体超越测绘", text: "当你决定远行出走时。你会携带哪种行李？", annotation: "笑着走向门外。你是永远在路上的朝圣者。", options: [
                { text: "不带行李。不想让任何过去成为我的锚。", target: "CAMUS" },
                { text: "精密的地图。虽然虚构但它能让我心安。", target: "BORGES" },
                { text: "在大门口大笑。这是对旧家的最后告别。", target: "CAMUS" },
                { text: "藏一朵干花。这是我唯一的苍凉温存。", target: "EILEEN_CHANG" }
            ] },
            { id: 29, origin: "物化意识", reading: "终极圣器", desc: "利刃剖开真实。望远镜观测逻辑。地图代表自由。", readingLabel: "意识物化逻辑", text: "哪件圣器最能代表你留给世界的最后遗产？", annotation: "你留下的痕迹是你对虚无最坚决的反抗。", options: [
                { text: "一把利刃。用来剖开这个世界的虚假外壳。", target: "CAMUS" },
                { text: "一架望远镜。用来观测永恒的星体逻辑。", target: "BORGES" },
                { text: "一瓶墨水。用来记下感官褶皱里的震颤。", target: "WOOLF" },
                { text: "一张地图。虽然它是虚构的但让我心安。", target: "KAFKA" }
            ] },
            { id: 30, origin: "归宿终局", reading: "装帧之问", desc: "锚定灵魂坐标。每一个选择都是一次实名投票。", readingLabel: "元叙事终局", text: "最后。如果把你的一生关进一本书。书名会是？", annotation: "恭喜。你已认领了你的文学灵魂手稿。", options: [
                { text: "《一个人的突围》", target: "KAFKA" },
                { text: "《关于虚无的最终解释》", target: "BORGES" },
                { text: "《被风吹散的十四行诗》", target: "WOOLF" },
                { text: "《无处寄达的匿名信》", target: "EILEEN_CHANG" }
            ] }
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentIdx, setCurrentIdx] = useState(0);
            const [scores, setScores] = useState({ 
                KAFKA:0, BORGES:0, CAMUS:0, WOOLF:0, EILEEN_CHANG:0, 
                BEAUVOIR:0, SAGAN:0, WILDE:0, MURAKAMI:0 
            });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [dynamicStats, setDynamicStats] = useState({ q: 0, l: 0, r: 0, a: 0 });
            const [isSaving, setIsSaving] = useState(false);
            const [code, setCode] = useState("");
            const [showError, setShowError] = useState(false);
            const [showAnnotation, setShowAnnotation] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);

            const handleVerify = () => { if (code.toLowerCase().trim() === "cloud") setStep('quiz'); else { setShowError(true); setTimeout(() => setShowError(false), 500); } };

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setScores(newScores);
                setHistory([...history, { scores: { ...scores }, currentIdx }]);
                setShowAnnotation(false);

                if (currentIdx < QUESTIONS.length - 1) {
                    setTimeout(() => { setCurrentIdx(currentIdx + 1); window.scrollTo(0, 0); }, 120);
                } else {
                    const topTarget = Object.keys(newScores).reduce((a, b) => (newScores[a] || 0) > (newScores[b] || 0) ? a : b, "BORGES");
                    const res = ARCHETYPES[topTarget] || ARCHETYPES.KAFKA;
                    const qP = Math.min(96, 45 + (newScores.WOOLF || 0)*12 + (Math.random()*10));
                    const lP = Math.min(96, 45 + (newScores.BORGES || 0)*12 + (Math.random()*10));
                    const rP = Math.min(96, 45 + (newScores.CAMUS || 0)*12 + (Math.random()*10));
                    const awk = (88 + (qP + lP + rP) / 35).toFixed(1);
                    setDynamicStats({ q: Math.round(qP), l: Math.round(lP), r: Math.round(rP), a: awk });
                    setResult(res);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentIdx(last.currentIdx); setHistory([...history]); } else setStep('welcome'); };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    const ctx = radarCanvas.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['理式', '感质', '意志', '灵气', '韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(58, 56, 51, 0.1)',
                                borderColor: '#3a3833',
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: { r: { grid: { color: 'rgba(0,0,0,0.04)' }, pointLabels: { font: { size: 9, weight: '600' } }, ticks: { display: false }, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-6 py-8 min-h-screen text-center">
                    {step === 'welcome' && (
                        <div className="animate-fade-in space-y-12 pt-10">
                            <div className="text-left">
                                <h1 className="text-4xl font-black tracking-tight text-[#000000] leading-tight text-center md:text-left">寻找你的<br /><span className="highlight-yellow">文学原型</span></h1>
                                <p className="text-[9px] font-bold text-gray-400 mt-4 uppercase tracking-[0.3em] text-center md:text-left">Arché Narrative Lab // 2026 Archive Project</p>
                            </div>
                            <div className="w-full max-w-[220px] mx-auto opacity-90 grayscale contrast-125"><BrainJar /></div>
                            <div className="space-y-12">
                                <div className="text-left border-l-4 border-[#e8ed2a] pl-5 space-y-4">
                                    <p className="text-base font-bold leading-relaxed text-[#3a3833]">基于 20 位文学宗师的精神切片，进行一次关于“生存境界”的深度测算。</p>
                                    <p className="text-[11px] text-gray-500 font-medium text-left italic text-center md:text-left">“文学并非修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={`flex flex-col items-center gap-4 ${showError ? 'shake' : ''}`}>
                                    <span className="text-[9px] uppercase tracking-[0.3em] opacity-40 font-bold">通行码认证 / ACCESS CODE</span>
                                    <input type="text" value={code} onChange={(e) => setCode(e.target.value)} className="redeem-input w-48 py-2 text-sm text-center" placeholder="ENTER CODE" />
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#141312] text-white text-xs tracking-[1.2em] font-bold active:scale-95 transition-all uppercase rounded-sm">激活档案库 / START</button>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-8 text-center">
                            <div className="flex justify-between items-center pb-5 border-b border-[#dcd8cf]">
                                <button onClick={handleBack} className="btn-back-blue">← BACK / 返回</button>
                                <span className="text-[11px] font-bold text-[#b0a48a] uppercase font-mono tracking-widest">ARCHIVE {String(currentIdx + 1).padStart(2, '0')} / 30</span>
                            </div>
                            <div className="source-box">
                                <div className="flex items-center">
                                    <span className="tag-black">文学背景</span>
                                    <span className="source-title">{QUESTIONS[currentIdx].origin}</span>
                                </div>
                                <p className="source-desc">“{QUESTIONS[currentIdx].desc}”</p>
                                <div className="mt-4 text-left"><span className="tag-outline">核心论题: {QUESTIONS[currentIdx].readingLabel}</span></div>
                            </div>
                            <h2 className="main-question text-justified">{QUESTIONS[currentIdx].text}</h2>
                            <div className="space-y-3">
                                {QUESTIONS[currentIdx].options.map((option, idx) => (
                                    <div key={idx} onClick={() => handleAnswer(option.target)} className="option-card">
                                        <p className="option-content text-left">{option.text}</p>
                                    </div>
                                ))}
                            </div>
                            <div className="annotation-area">
                                <div className="annotation-btn" onClick={() => setShowAnnotation(!showAnnotation)}>{showAnnotation ? '收起注解 ︿' : '查看注解 ﹀'}</div>
                                {showAnnotation && <div className="annotation-content animate-fade-in text-justified">{QUESTIONS[currentIdx].annotation}</div>}
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-6 pb-20">
                            <div ref={captureRef} className="p-2 space-y-6 bg-[#f2f0e9]">
                                <div className="text-center space-y-4 pt-16 bg-white border border-[#dcd8cf] rounded-sm relative overflow-hidden pb-12 shadow-sm">
                                    <div className="tag-soul-id uppercase">NO. 2026-ARCHIVE-SOUL</div>
                                    <span className="text-[8px] font-bold uppercase tracking-[0.6em] text-[#8a8882] block text-center">Archetype Analysis Report</span>
                                    <h2 className="text-4xl font-bold text-[#3a3833] tracking-[0.1em] text-center my-4">{result.name}</h2>
                                    <p className="text-[10px] text-[#35afcb] italic tracking-[0.4em] font-black uppercase text-center opacity-70">— {result.sub} —</p>
                                    <div className="flex justify-center gap-3 pt-6 text-center">
                                        <span className="px-3 py-1 border border-gray-300 text-[8px] font-bold uppercase tracking-tighter">觉醒度 {dynamicStats.a}%</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[8px] font-bold uppercase">Identity Validated</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-10 border border-[#dcd8cf] rounded-3xl shadow-sm relative text-left">
                                    <div className="space-y-6 font-sans text-left">
                                        <h4 className="section-header">叙事基因分析 / ARCHIVE</h4>
                                        <div className="space-y-6 text-left">
                                            {[["感质驱动", dynamicStats.q, "#e8ed2a"], ["理式逻辑", dynamicStats.l, "#35afcb"], ["反叛意志", dynamicStats.r, "#000000"]].map(([lbl, val, clr]) => (
                                                <div key={lbl} className="space-y-2 text-left">
                                                    <div className="flex justify-between text-[8px] font-bold uppercase tracking-tight text-gray-500"><span>{lbl}</span><span>{val}%</span></div>
                                                    <div className="progress-bar"><div className="progress-fill" style={{width: `${val}%`, backgroundColor: clr}}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[160px] mx-auto text-center"><canvas ref={radarCanvas}></canvas></div>
                                </div>
                                <div className="result-card text-left">
                                    <h4 className="section-header">精神解剖报告 / THE SELF</h4>
                                    <div><span className="logic-label">文学原型界定</span><p className="logic-p font-bold italic text-justified">“{result.identity}”</p></div>
                                    <div className="border-t border-gray-50 pt-6"><span className="logic-label">叙事风格建议</span><p className="logic-p font-medium text-[#d14d42] bg-red-50/10 p-4 rounded-sm italic text-red-800 text-justified">{result.writing}</p></div>
                                    <div className="border-t border-gray-50 pt-6 text-left"><span className="logic-label">临床症候</span><p className="logic-p text-gray-500 text-justified">{result.symptom}</p></div>
                                    <div className="border-t border-gray-50 pt-6 text-left"><span className="logic-label">生存建议</span><p className="logic-p font-black text-[#35afcb] text-justified">{result.counsel}</p></div>
                                </div>
                                <div className="result-card text-left">
                                    <h4 className="section-header">灵魂分析 / THE SOUL</h4>
                                    <span className="logic-label">精神内核 / Internal Logic</span><p className="logic-p italic text-justified">{result.soul.logic}</p>
                                    <span className="logic-label">人格显影 / Manifestation</span><p className="logic-p text-justified">{result.soul.display}</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                                    <div className="result-card" style={{borderColor: '#ffdada', background: '#fffafa'}}><h4 className="section-header" style={{color: '#d14d42'}}>阴影投射 / SHADOW</h4><span className="logic-label">核心焦虑 / Anxiety</span><p className="logic-p text-red-900 font-bold mb-0 text-justified">{result.anxiety || "无法识别"}</p><div className="mt-6 border-t border-red-100 pt-4 text-left"><span className="logic-label">投影分析</span><p className="text-[12px] leading-relaxed text-red-800 opacity-70 text-justified">{result.shadow.projection}</p></div></div>
                                    <div className="result-card"><h4 className="section-header">接纳与自洽 / ACCEPTANCE</h4><span className="logic-label">阴影接纳 / Acceptance</span><p className="logic-p mb-0 font-bold underline decoration-[#d14d42] underline-offset-4 text-justified">{result.shadow.acceptance}</p><div className="mt-6 border-t border-gray-100 pt-4 text-left"><span className="logic-label">人格处方 / Prescription</span><p className="text-[12px] leading-relaxed text-gray-600 italic font-medium text-justified">{result.self.prescription}</p></div></div>
                                </div>
                                <div className="result-card text-left">
                                    <h4 className="section-header">思想进阶书单推荐 / READINGS</h4>
                                    <div className="grid gap-4">
                                        {result.self.books.map((book, i) => (
                                            <div key={i} className="book-item shadow-sm hover:shadow-md transition-all text-left">
                                                <span className="tag-recommend">Recommend</span><h5 className="text-[15px] font-bold text-[#3a3833] mb-1">《{book.title}》</h5><p className="text-[10px] font-bold text-[#a4c29b] uppercase mb-3 text-left">作者: {book.author}</p><p className="text-[11px] text-[#888] leading-relaxed text-justified italic">{book.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="pt-10 space-y-4 px-6 text-center">
                                <button onClick={async () => { setIsSaving(true); const canvas = await html2canvas(captureRef.current, { scale: 2, useCORS: true }); const link = document.createElement('a'); link.download = `文学报告-${result.name}.png`; link.href = canvas.toDataURL(); link.click(); setIsSaving(false); }} className="w-full py-6 bg-black text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center">{isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({ KAFKA:0, BORGES:0, CAMUS:0, WOOLF:0, EILEEN_CHANG:0, BEAUVOIR:0, SAGAN:0, WILDE:0, MURAKAMI:0 }); setCurrentIdx(0); setHistory([]); setCode(""); }} className="w-full py-6 border-2 border-black text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40 text-center"><div className="text-[8px] uppercase tracking-widest mb-1 font-bold text-center">Arché Digital Narrative Lab</div><div className="text-xs font-bold border-b border-black inline-block px-2 text-center text-center text-center">Arché 思想铺子</div></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
