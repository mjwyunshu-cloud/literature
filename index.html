            { id: 5, origin: "沈从文《边城》审美博弈", background: "认为作家选择的空间布局（如密室、荒野、边城）实际上是其内心精神结构的投影。", text: "在命运的风景中，你最渴望拥有哪种精神地理坐标？你最想置身于哪种环境？", reading: "《边城》", options: [{ text: "荆棘满地的角斗场：我生来就喜欢这种高压力的对抗感", target: "HEMINGWAY" }, { text: "几何形状的森林：每一棵树影后面都藏着指向真理的线索", target: "BORGES" }, { text: "江南那种连绵的烟雨：是我躲避异化现实唯一的防空洞", target: "EILEEN_CHANG" }, { text: "不停翻滚的大海：它每一刻都在喊我去远方流浪", target: "CAMUS" }] },
            { id: 6, origin: "克拉丽丝·李斯佩克朵《受难》", background: "女主人公在一个极其整洁的房间里，突然面对一只被挤扁的蟑螂，从而引发了对存在本质的战栗。", text: "你精心维持的、体面整洁的生活突然被一个极其恶心、真实的事物（如一段丑闻）刺破了。在那阵强烈的生理反胃感中，你会？", reading: "《星辰时刻》", options: [{ text: "直面那个真相：通过这种恶心感，我才第一次触碰到真实的世界", target: "LISPECTOR" }, { text: "解剖这种感觉：分析为什么这种微小事物能击垮我引以为傲的理性", target: "BORGES" }, { text: "立刻清除它：毁掉证据，假装我的生活从未受过玷污", target: "HEMINGWAY" }, { text: "放声大笑：意识到我以前那种所谓的‘体面’是多么滑稽与脆弱", target: "KAFKA" }] },
            { id: 7, origin: "阿加莎·克里斯蒂《尼罗河上的惨案》", background: "在封闭的豪华游轮上，所有人都在说谎，真相往往隐藏在每个人的谎言与逻辑缝隙之中。", text: "你被迫卷入了一场错综复杂的权力纠纷。作为唯一的局外人，你察觉到每个人都在演戏。此时你会？", reading: "《东方快车谋杀案》", options: [{ text: "拼图错位的快感：我一定要把所有的线索都理顺、闭环，找出真凶", target: "CHRISTIE" }, { text: "时代的悲剧：意识到法律和正义有时候其实并没有那么神圣", target: "HEMINGWAY" }, { text: "规则就是个骗局：既然大家都在演，那我就把局搅得更乱", target: "KAFKA" }, { text: "窗外的雪景真干净：和这肮脏的纠纷对比起来真漂亮", target: "EILEEN_CHANG" }] },
            { id: 8, origin: "奥斯卡·王尔德《道林·格雷的画像》", background: "美少年用灵魂交换了画像替他衰老和记录罪恶，自己则永远保持纯洁与美。", text: "如果有一种超能力能替你承受所有岁月的衰老和丑陋，而你永远保持现在。面对这份契约，你会说？", reading: "《深渊书简》", options: [{ text: "“成交！只要皮囊永远漂亮，灵魂烂透了我也无所谓”", target: "EILEEN_CHANG" }, { text: "“画出我最丑陋真实的样子，我要拿它去嘲讽这个虚伪的世界”", target: "KAFKA" }, { text: "“展现抗争：画出我变老的样子，那是人对抗时间的证据”", target: "HEMINGWAY" }, { text: "“没兴趣：这种用感性换感性的买卖，逻辑上并不成立”", target: "BORGES" }] },
            { id: 9, origin: "艾米莉·狄金森《诗集》", background: "狄金森终身隐居，通过极其凝练的词汇在方寸之间探测生死的深度。", text: "面对一次无法回避的巨大失败，你看着夕阳逐渐消失。在那一抹最后的流光里，你会留下什么独白？", reading: "《孤独是迷人的》", options: [{ text: "“这也是我内心宇宙里唯一的太阳，美得凄凉”", target: "DICKINSON" }, { text: "“光线反射而已，规律本身比这些颜色要美得多”", target: "BORGES" }, { text: "“那是黑暗降临前的最后挣扎，我绝不向结局低头”", target: "HEMINGWAY" }, { text: "“大幕落下了，灵魂该去更远的地方流浪了”", target: "CAMUS" }] },
            { id: 10, origin: "阿尔贝·加缪《西绪福斯神话》", background: "众神惩罚西绪福斯将巨石推上山顶，每到山顶石头又会滚落，这种苦役永无止境。", text: "如果你的人生就像推石头上山，刚推上去它又会滚下来，永无止境。面对这种注定徒劳的循环，你打算如何完成这场搏斗？", reading: "《局外人》", options: [{ text: "对着众神狂笑：只要我不在乎这种徒劳，众神就拿我没办法", target: "CAMUS" }, { text: "把名字刻在山顶：那是由于我推过，所以它真实存在过", target: "HEMINGWAY" }, { text: "研究石头滚落的曲线：发现规律比结果更能让我超脱", target: "BORGES" }, { text: "在山脚种一朵小花吧，苦活累活也就没那么难熬了", target: "EILEEN_CHANG" }] },
            { id: 11, origin: "马塞尔·普鲁斯特《追寻逝去的时光》", background: "由一块玛德琳蛋糕开启了主角对过去岁月的漫长追寻，确证了感官瞬间的永恒。", text: "某种熟悉的味道突然勾起了你多年前的一段记忆。那一刻，你会如何处理这份汹涌的回忆？", reading: "《在少女花影下》", options: [{ text: "闭上眼：在那个过去的午后里待一辈子，再也不出来了", target: "PROUST" }, { text: "想研究：看看大脑是怎么加工这份记忆的，思考其中的机制", target: "BORGES" }, { text: "觉得沉重：过去是个牢笼，我得赶紧走开，去别的地方", target: "CAMUS" }, { text: "作为武器：把这份记忆当成反抗现在的子弹，射向生活", target: "KAFKA" }] },
            { id: 12, origin: "赫尔曼·黑塞《荒原狼》", background: "主角在绝望中进入了只供“疯子”进入的剧场，直面了自己的多重人格。", text: "街角看到一个魔幻剧场门口挂着：“仅供疯子进入”。作为过路的旁观者，你会做出什么举动？", reading: "《德米安》", options: [{ text: "笑一下：正常人的灵魂才叫死水一潭，我想进去看看", target: "CAMUS" }, { text: "去观看灵魂里的潮汐，哪怕最后把自己给淹死也认了", target: "WOOLF" }, { text: "分析准入机制：寻找被放进去的‘疯子’标准到底是什么", target: "BORGES" }, { text: "撕掉那块牌子：没有人有权定义疯子，我要自己定规则", target: "KAFKA" }] },
            { id: 13, origin: "西尔维娅·普拉斯《钟形罩》", background: "书名隐喻了一种抑郁状态下的极致隔绝——仿佛被倒扣的钟形罩罩住，呼吸着陈腐空气。", text: "在繁忙社交场合，你突然感到一种透明但沉重的隔绝感。在这种近乎窒息的压抑中，你最本能的动作是？", reading: "《爱丽儿》", options: [{ text: "直接撞击玻璃：哪怕满手是血也要亲手碰碰真实的阳光", target: "PLATH" }, { text: "存证：在墙上记下每一道裂痕，这叫为这段极致的痛苦存证", target: "KAFKA" }, { text: "幻化：在脑子里建个乌托邦，在这里我谁也不是，我是自由的", target: "WOOLF" }, { text: "整理：体面地在那份孤独里等到结局到来", target: "HEMINGWAY" }] },
            { id: 14, origin: "弗朗索瓦丝·萨冈《你好，忧愁》", background: "描写了青春的任性与幻灭。车速极快时，忧愁获得了一种轻盈的美感。", text: "情绪压抑的午后，你开着跑车极限飞驰。当车速快到让你感觉到某种眩晕和幻灭感时：", reading: "《某种微笑》", options: [{ text: "速度就是唯一的药：这种破坏掉现实束缚的感觉真好", target: "KAFKA" }, { text: "我觉得我是完整的：风声就是我在异乡的呼吸声", target: "CAMUS" }, { text: "算算风阻：看看这种极限疯狂背后的心理代偿机制是什么", target: "BORGES" }, { text: "夕阳美得让人想哭：这种优雅的忧愁才是我最贵的勋章", target: "EILEEN_CHANG" }] },
            { id: 15, origin: "阿蒂尔·兰波《地狱一季》", background: "兰波在诗中宣布了对传统的决裂，并以自毁式的狂热探索通灵者的境界。", text: "如果有一种契约能让你瞬间获得某种极致的才华，代价是交出你灵魂中最纯粹、最珍贵的那一半。面对诱惑，你的回击是？", reading: "《彩画集》", options: [{ text: "换！只要那一瞬间最灿烂的火光，之后就算死掉也值了", target: "LISPECTOR" }, { text: "拔剑：这是对生命的羞辱，我一定要打赢这一场博弈", target: "HEMINGWAY" }, { text: "拒绝：我的灵魂早已挥洒在路上，他来晚了", target: "CAMUS" }, { text: "成交：然后仔细盯着契约的漏洞，看看能不能把它反杀了", target: "BORGES" }] },
            { id: 16, origin: "詹姆斯·乔伊斯《都柏林人》", background: "书中描绘了陷入“精神瘫痪”的都柏林人，展现了平庸生活背后的荒诞与死水。", text: "当你走在一条充满机械感的街道上，意识到所有人都在这种“瘫痪”中老去。在那一瞬间你会？", reading: "《尤利西斯》", options: [{ text: "记录细节：这一幕里藏着不朽的符号，细节才是真理", target: "BORGES" }, { text: "必须打破这种瘫痪：哪怕用暴力也要炸开这个死循环", target: "KAFKA" }, { text: "死不就是去远方出趟差吗？这些形式感真累人", target: "CAMUS" }, { text: "捕捉唯美：死者的脸在夕阳下真宁静，这是感官的救赎", target: "EILEEN_CHANG" }] },
            { id: 17, origin: "让-弗朗索瓦·利奥塔 叙事理论", background: "主张宏大叙事已经失效，真实藏在那些零散的、微观的、不服从的叙述之中。", text: "如果历史即将终结，世界只能剩下一个词。你会选择留下哪一个词汇来连接未来的“未知”？", reading: "《后现代状况》", options: [{ text: "“但是” —— 永远代表反抗与转折的可能", target: "KAFKA" }, { text: "“因为” —— 守住因果律与逻辑的最后底线", target: "BORGES" }, { text: "“也许” —— 为这个冰冷的世界，保留最后一点朦胧审美", target: "WOOLF" }, { text: "“再会” —— 预示着在另一个地平线上，我们再次启程", target: "CAMUS" }] },
            { id: 18, origin: "聚斯金德《香水》感官理论", background: "气味描写能穿透理性的防线，直击记忆深处。嗅觉是欲望最原始的抓包工具。", text: "如果文字真的有气味，读完你的人生手稿后应当弥漫着哪种气息？", reading: "《香水》", options: [{ text: "福尔马林：冷静、洁净、带有一种解剖质感的智性气味", target: "BORGES" }, { text: "火药与泥土：粗砺、带有破坏秩序后的炽热余温", target: "KAFKA" }, { text: "旧报纸和丁香花：怀旧、敏感且有点脆弱的诗意", target: "PROUST" }, { text: "咸涩的海风：野性、广阔且带着孤独的自由冲力", target: "HEMINGWAY" }] },
            { id: 19, origin: "托尼·莫里森《宠儿》", background: "通过“找回名字”的过程完成族群尊严的修复，主张书写被抹去的创伤历史。", text: "面对那些被权势刻意抹去的、沉重的伤痕历史。你打算如何确立自己在这些历史裂纹中的站位？", reading: "《所罗门之歌》", options: [{ text: "在博弈中找回那个被丢掉的名字，以此博回个体的尊严", target: "MORRISON" }, { text: "远方的自由比历史更有意义，我背负着伤痕继续走", target: "CAMUS" }, { text: "看透这些痛苦如何被权力操纵，不再让自己陷进去", target: "BORGES" }, { text: "痛痛快快哭一场，然后把血迹写成诗，让这种残酷变美", target: "EILEEN_CHANG" }] },
            { id: 20, origin: "玛格丽特·阿特伍德《末世观察》", background: "小说构建了一个反乌托邦的世界，展示了文明脆弱的边界。", text: "当你预感到你所熟悉的一切秩序即将崩塌。此时你最想为自己做的一件事是？", reading: "《盲刺客》", options: [{ text: "记录下每个逻辑错误：别让后来人再掉进同样的坑里", target: "BORGES" }, { text: "大笑：这荒唐的剧终于谢幕了，废墟看着真有一种野性美", target: "KAFKA" }, { text: "寻找精神绿洲：没人认识我的时候才是我最自由的瞬间", target: "CAMUS" }, { text: "整理风度：体体面面地在那份绝望里向结局敬一杯酒", target: "HEMINGWAY" }] },
            { id: 21, origin: "沈从文《边城》审美博弈", background: "认为作家选择的空间布局（如密室、荒野、边城）实际上是其内心精神结构的投影。", text: "在命运的风景中，你最渴望拥有哪种精神地理坐标？", reading: "《边城》", options: [{ text: "荆棘满地的角斗场：我生来就喜欢这种高压力的对抗感", target: "HEMINGWAY" }, { text: "几何形状的森林：每一棵树影后面都藏着指向真理的线索", target: "BORGES" }, { text: "江南那种连绵的烟雨：是我躲避异化现实唯一的防空洞", target: "EILEEN_CHANG" }, { text: "不停翻滚的大海：它每一刻都在喊我去远方流浪", target: "CAMUS" }] },
            { id: 22, origin: "海明威‘冰山理论’", background: "叙事中的留白往往比文字更有力量。‘不说’的部分决定了真实。", text: "一场关乎你人生命运的谈话突然中断，陷入了长久的沉默。在这一页留白中，你本能地感到什么？", reading: "《尤利西斯》", options: [{ text: "最诚实时刻：言语都是伪装，只有沉默能暴露真相关联", target: "BORGES" }, { text: "尊严的防线：有些话一旦说出口就轻浮了，沉默是孤岛", target: "HEMINGWAY" }, { text: "最决绝的反抗：我拒绝使用你们的词汇，这死寂是审判", target: "KAFKA" }, { text: "灵魂的震颤：空气中的微尘变得清晰，沉默即神性", target: "WOOLF" }] },
            { id: 23, origin: "残雪《黄泥街》偶然性叙事", background: "在严密的系统之外，总会有偶然的溢出，那正是主体性萌发的地方。", text: "你在平庸琐碎的生活账本边缘（比如公文里），发现了一个只属于你的私密国家。你会对它做什么？", reading: "《黄泥街》", options: [{ text: "感到不安：这是秩序之外的非法寄生，应当被彻底清除", target: "KAFKA" }, { text: "感到自豪：这是主体性的最后一块自留地，是抗衡的堡垒", target: "HEMINGWAY" }, { text: "感到好奇：这是系统的一种偶然溢出，证明了现实并不稳定", target: "BORGES" }, { text: "感到解脱：在这里我终于不再是一个被叙述的人", target: "WOOLF" }] },
            { id: 24, origin: "马尔克斯《百年孤独》神秘主义", background: "文学中的神秘主义是对规律之外‘神圣偶然’的审美敬畏。", text: "当你面对生命中那些无法用逻辑解释、带有宿命色彩的瞬间（如极度巧合的重逢）：", reading: "《百年孤独》", options: [{ text: "美学上的震撼：一旦解释清楚了，这种美也就凋谢了", target: "WOOLF" }, { text: "智性上的挑战：总有一天我会算出其中的概率公式", target: "BORGES" }, { text: "存在上的怀疑：我要用不断的怀疑把真相逼出来", target: "KAFKA" }, { text: "自由上的诱惑：它引领我走向更遥远、更未知的地带", target: "CAMUS" }] },
            { id: 25, origin: "元叙事博弈论", background: "探索叙事者与被叙述者之间的权力拉锯。", text: "当你的对手是你亲手写的角色（或者是你内心的一部分）时：", reading: "《变形记》", options: [{ text: "比我还坚定：甚至能跳出来反过来审判我的平庸", target: "KAFKA" }, { text: "是我智性的镜像：在逻辑的巅峰跟我来一场永恒对弈", target: "BORGES" }, { text: "是我理想人格的化身：替我在充满尘埃的世界里完成救赎", target: "WOOLF" }, { text: "展现主体性尊严：即便在死的时候也要让我感到体面", target: "HEMINGWAY" }] },
            { id: 26, origin: "欧内斯特·海明威《流动的盛宴》", background: "展现了海明威对巴黎青年时代的怀旧记录，强调即使贫穷也要保持风度。", text: "一场极尽繁华的盛宴散后。你走在深夜的街头。面对这突如其来的寂静，你的真实决策是？", reading: "《乞力马扎罗的雪》", options: [{ text: "直接出城：下个地方肯定有更好的酒、更有意思的人", target: "CAMUS" }, { text: "在路灯下站得笔直：展现作为一个人的、最后的风度", target: "HEMINGWAY" }, { text: "记录灵魂切片：把这一晚所有的心理细节记下来备查", target: "BORGES" }, { text: "写首绝笔情诗：把这种陨落的痛苦转化为审美的永恒", target: "WOOLF" }] },
            { id: 27, origin: "存在主义神性荒原", background: "个体可以通过‘行动’在没有任何神谕的荒原中确立神圣性。", text: "面对命运中那股无法抵抗、且不给任何解释的力量。你打算如何回击这股压抑的“沉默”？", reading: "《禁闭》", options: [{ text: "拔出长剑：向那片虚无发起一场尊严挑战", target: "HEMINGWAY" }, { text: "笑死：所谓神或命运不就是人类逻辑极其苍白的投射吗？", target: "KAFKA" }, { text: "转身走向沙漠：在那儿连宿命也管不到我", target: "CAMUS" }, { text: "闭上眼：给自己编个神圣瞬间，用幻觉去填补空白", target: "WOOLF" }] },
            { id: 28, origin: "霍桑《红字》形态学", background: "文字的形状即是其灵魂的骨架。", text: "如果你的生命最终非要变成一种具体的物理形状。你会选择赋予“自我”哪种视觉锚点？", reading: "《红字》", options: [{ text: "一把烧得通红的火：点燃了别人同时也毁掉了自己", target: "KAFKA" }, { text: "一个完美的圆圈：首尾相接、因果环合，逻辑自闭", target: "BORGES" }, { text: "一条一直延伸到天边外的直线：永远指向未知的下一站", target: "CAMUS" }, { text: "一片随风飘着的羽毛：捕捉风的颤动，飘到哪儿算哪儿", target: "WOOLF" }] },
            { id: 29, origin: "弗朗茨·卡夫卡《法门前》", background: "乡下人在法门前等待终生却未获准进入，临终前被告知‘这扇门只为你而开’。", desc: "一扇专门为你而开的大门就在眼前，但守门人却拒绝让你通过。你已经在门外枯坐了数十年。", text: "临死前，你打算对这个耗尽了你一生的秘密做点什么？", reading: "《审判》", options: [{ text: "对着守门人大笑：原来根本没有什么门，是我自己把自己关住了", target: "KAFKA" }, { text: "起身走向荒野：世界宽广着呢，我没必要非得进这扇门不可", target: "CAMUS" }, { text: "最后一次推演：想弄清楚守门人那句‘现在不行’背后到底藏着什么逻辑", target: "BORGES" }, { text: "闭上眼编个美梦：假装已经进去了，这样死得比较体面", target: "EILEEN_CHANG" }] },
            { id: 30, origin: "灵魂圣器转录逻辑", background: "文学创作是将不可见的意识“物化”为具有能量的圣器。", text: "最后，如果你一生的意识最后成了一件文学圣器。那应当是？", reading: "《虚构集》", options: [{ text: "一把剖开伪善的利刃", target: "REBEL" }, { text: "一架能看清星体运行的望远镜", target: "SAGE" }, { text: "一个装满了晚霞的墨水瓶", target: "IDEALIST" }, { text: "一张永远折叠不完的灵魂地图", target: "WANDERER" }] }
        ];

        const JarIllustration = () => (
            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm">
                <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke={COLORS.textMain} strokeWidth="1.5" />
                <path d="M160 110 L240 110" stroke={COLORS.textMain} strokeWidth="1" />
                <g transform="translate(180, 210)">
                    <circle cx="20" cy="20" r="8" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                    <path d="M20 28 Q 20 55 10 75 M20 28 Q 20 55 30 75" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                    <path d="M12 45 Q 20 40 28 45" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                </g>
                <circle cx="330" cy="110" r="4" fill={COLORS.textMain} />
                <circle cx="350" cy="55" r="28" fill={COLORS.accentYellow} opacity="0.35" />
                <rect x="45" y="245" width="45" height="45" rx="22" fill={COLORS.accentGreen} opacity="0.25" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({ REBEL:0, SAGE:0, IDEALIST:0, WANDERER:0, HERO:0, KAFKA:0, CAMUS:0, LISPECTOR:0, BORGES:0, HEMINGWAY:0, WOOLF:0, EILEEN_CHANG:0, DICKINSON:0, BEAUVOIR:0, CHRISTIE:0, MARQUEZ:0, DURAS:0, HESSE:0, MURAKAMI:0, MORRISON:0, ATWOOD:0, JOYCE:0, SAGAN:0, PROUST:0 });
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [code, setCode] = useState("");
            const [showError, setShowError] = useState(false);
            
            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            const handleVerify = () => { if (code.toLowerCase().trim() === "cloud") setStep('quiz'); else { setShowError(true); setTimeout(() => setShowError(false), 500); } };
            
            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores: { ...scores }, currentQuestion }]);
                setScores(newScores);
                if (currentQuestion < 29) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const topTarget = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b);
                    setResult(Object.assign({}, ARCHETYPES[topTarget] || ARCHETYPES.KAFKA, { key: topTarget }));
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentQuestion(last.currentQuestion); setHistory([...history]); } else { setStep('welcome'); } };
            const handleRestart = () => { setStep('welcome'); setCurrentQuestion(0); setScores({}); setHistory([]); setResult(null); setCode(""); window.scrollTo(0, 0); };

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `文学报告-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['批判逻辑', '智性深度', '审美追求', '自由意志', '精神韧性'],
                            datasets: [{ data: result.stats, backgroundColor: 'rgba(53, 175, 203, 0.12)', borderColor: COLORS.accentBlue, borderWidth: 1.5, pointRadius: 0 }]
                        },
                        options: { scales: { r: { angleLines: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { font: { size: 10, family: 'Noto Serif SC', weight: 'bold' }, color: COLORS.textSecondary }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#35afcb] text-white text-[9px] tracking-widest font-sans mb-4 transform -rotate-2">Psychographic Assessment</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-[#3a3833]">寻找你的<br /><span className="font-bold border-b-4 border-[#e8ed2a]">文学原型</span></h1>
                            </div>
                            <div className="w-full max-w-[340px] mx-auto aspect-[4/3.5] relative opacity-80">
                                <JarIllustration />
                            </div>
                            <div className="space-y-10">
                                <div className="space-y-4 px-4 text-left border-l-2 border-[#e8ed2a] pl-4">
                                    <p className="text-[13px] text-[#3a3833] leading-relaxed font-bold tracking-widest underline decoration-[#e8ed2a] decoration-4 underline-offset-4">这是一场基于 20 位世界宗师、关于“人性临界处”博弈的精神测绘。</p>
                                    <p className="text-xs text-[#6d6b64] leading-relaxed tracking-wider font-light italic">“文学不是修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={`space-y-4 ${showError ? 'shake' : ''}`}>
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold font-sans">通行码认证 / ACCESS CODE</span>
                                        <input type="text" value={code} onChange={(e) => setCode(e.target.value)} className="redeem-input w-48 py-2 text-sm text-center" placeholder="请输入通行码解锁测试" />
                                    </div>
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#3a3833] text-white text-[11px] tracking-[0.8em] font-bold active:scale-95 transition-all shadow-xl text-center">开启漫游 / LAUNCH</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em] font-sans text-center">Arché 思想铺子实验室出品</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10 text-center">
                            <div className="flex justify-between items-center border-b border-[#dcd8cf] pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest">BACK</button>
                                <span className="text-[9px] uppercase text-[#6d6b64] font-black tracking-widest opacity-40">DECISION {String(currentQuestion + 1).padStart(2, '0')} / 30</span>
                                <div className="w-10"></div>
                            </div>
                            
                            <div className="w-full text-left bg-[#3a383308] p-6 border-l-4 border-[#3a383333]">
                                <div className="flex items-baseline gap-2 mb-3">
                                    <span className="text-[10px] font-bold bg-[#3a3833] text-white px-2 py-0.5 rounded-sm font-sans whitespace-nowrap uppercase">文学背景</span>
                                    <span className="text-[13px] font-bold opacity-80">{QUESTIONS[currentQuestion].origin}</span>
                                </div>
                                <p className="text-[12px] leading-relaxed text-[#a4c29b] mb-3 font-medium italic opacity-80">“{QUESTIONS[currentQuestion].background}”</p>
                                <div className="flex items-baseline gap-2 pt-2 border-t border-[#3a383315]">
                                    <span className="text-[8px] font-bold border border-[#3a383333] px-1.5 py-0.5 uppercase opacity-50 font-sans tracking-widest">扩展阅读</span>
                                    <span className="text-[10px] opacity-40 font-medium">{QUESTIONS[currentQuestion].reading}</span>
                                </div>
                            </div>

                            {/* 核心决策题干 */}
                            <h2 className="text-[19px] md:text-[22px] font-bold leading-[1.6] text-[#3a3833] text-left border-t border-[#dcd8cf] pt-6 tracking-tight">
                                {QUESTIONS[currentQuestion].text}
                            </h2>

                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                    <button key={idx} onClick={() => handleAnswer(option.target)} className="w-full p-6 bg-white bg-opacity-70 rounded-sm border border-[#dcd8cf] hover:border-[#3a3833] transition-all group active:bg-white text-left shadow-sm">
                                        <span className="text-[15px] text-[#6d6b64] group-hover:text-[#3a3833] leading-relaxed pr-4 font-medium">{option.text}</span>
                                    </button>
                                ))}
                            </div>
                            
                            <div className="pt-6 flex justify-center">
                                <div className="h-[1px] w-full bg-[#dcd8cf] relative opacity-50">
                                    <div className="h-full bg-[#3a3833] transition-all duration-700" style={{ width: `${((currentQuestion + 1) / 30) * 100}%` }}></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#f2f0e9]">
                                <div className="text-center space-y-6 py-12 bg-white border border-[#dcd8cf] rounded-sm shadow-sm relative overflow-hidden text-center">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#35afcb] font-sans">Literature Archetype Profile</span>
                                    <h2 className="text-5xl font-bold text-[#3a3833] tracking-widest">{result.name}</h2>
                                    <p className="text-sm text-[#35afcb] italic tracking-[0.4em] font-sans text-center">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4 text-center">
                                        <span className="px-3 py-1 border border-[#3a3833] text-[9px] font-bold uppercase font-sans tracking-widest">思辨觉醒度 98%</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[9px] font-bold uppercase font-sans tracking-widest">主体性存证</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl relative">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-white border border-[#3a3833] text-[10px] font-bold transform rotate-3 shadow-sm font-sans uppercase">NO. 2026-Soul</div>
                                    <div className="space-y-4 text-left font-sans">
                                        <h4 className="text-[11px] font-bold border-b pb-2 text-left italic tracking-widest">叙事基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-3 text-[10px]">
                                            <div className="flex justify-between items-center uppercase"><span>感性驱动</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#e8ed2a]" style={{width:'85%'}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>理性逻辑</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#35afcb]" style={{width:'40%'}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>反叛意志</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-black" style={{width:'70%'}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto text-center">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                </div>

                                <div className="relative p-12 bg-white border border-[#dcd8cf] text-center shadow-sm text-center">
                                    <p className="text-xl md:text-2xl leading-relaxed mb-6 font-medium text-center italic text-[#3a3833]"><span className="highlight-yellow">“{result.quote}”</span></p>
                                    <div className="text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold text-center font-sans">— {result.name} —</div>
                                </div>

                                <div className="space-y-10 px-2 text-left font-sans">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans text-left tracking-widest">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-4 border-[#35afcb] space-y-5">
                                            <div>
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-widest">文学原型界定</span>
                                                <p className="text-[13px] leading-relaxed text-[#6d6b64] italic font-bold">“{result.identity}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase">写作偏好建议 (Writing Preference)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#d14d42] bg-red-50 p-3 rounded-sm italic">“{result.writing || "从生理性的真实出发，剥离修辞的伪善。"}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">精神症候解剖 (Symptom)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.symptom || "存在于规则缝隙中的主体性焦虑。"}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">叙事建议 (Counsel)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#35afcb]">{result.counsel || "认领你的孤独，在那片废墟上重建家园。"}</p>
                                            </div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4 text-left font-sans">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 tracking-widest">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-red-50 border border-red-100 rounded text-left">
                                                <div className="font-bold mb-1 uppercase tracking-widest text-red-700">主导焦虑</div>
                                                <div className="opacity-70 font-sans">{result.anxiety || "尚未捕捉到显性数据"}</div>
                                            </div>
                                            <div className="p-4 bg-gray-50 border border-gray-100 rounded text-left">
                                                <div className="font-bold mb-1 font-sans uppercase tracking-widest">阴影面</div>
                                                <div className="opacity-70 font-sans">{result.shadow || "尚未捕捉到显性数据"}</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans text-left tracking-widest">思想进阶书单推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="bg-white p-6 border border-[#dcd8cf] relative group shadow-sm text-left font-sans transition-all hover:bg-gray-50 rounded-xl">
                                                    <h5 className="text-[15px] font-bold mb-1">{book.title}</h5>
                                                    <p className="text-[10px] text-[#a4c29b] font-bold mb-2 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-[#6d6b64] italic leading-relaxed opacity-80">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] flex items-center justify-center gap-3 shadow-xl active:bg-gray-800 disabled:opacity-50 transition-all font-sans rounded-sm text-center">{isSaving ? "生成报告中..." : "保存灵魂手稿报告 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all font-sans active:scale-95 text-center">再次重启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4">
                        <div className="lab-signature flex flex-col items-center text-center">
                            <div className="text-[8px] text-[#999] tracking-[0.2em] uppercase mb-1 font-sans">A Digital Narrative Lab</div>
                            <div className="text-[12px] font-bold text-[#3a3833] tracking-[0.1em] border-b-2 border-[#3a3833] pb-0.5 px-1 font-sans">Arché 思想铺子</div>
                        </div>
                        <p className="text-[9px] tracking-[0.3em] uppercase text-[#6d6b64] opacity-40 font-sans mt-4 italic text-center">为精神生长提供坐标 / Mapping Mental Growth</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
