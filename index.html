                { text: "感受字符在屏幕上闪烁时的那点微弱震颤", target: "WOOLF" }
            ] },
            { id: 19, text: "在极度寂静中开始能听见尘埃落地，你会：", options: [
                { text: "感到恐慌。这种感官过载在撕裂理智边界", target: "WOOLF" },
                { text: "闭上眼沉浸。在战栗音律中找到灵魂归宿", target: "LISPECTOR" },
                { text: "开始计算。推导尘埃动能与落地分贝的关联", target: "BORGES" },
                { text: "点根烟。用烟味覆盖掉这种窒息的敏感", target: "CAMUS" }
            ] },
            { id: 20, text: "如果你可以获得极致才华，代价是灵魂的一半：", options: [
                { text: "成交！生命应该在瞬间的爆炸中成为火", target: "LISPECTOR" },
                { text: "拔剑。拒绝交换。尊严必须通过意志赢来", target: "HEMINGWAY" },
                { text: "拒绝。我的灵魂早已挥洒在路上，他来晚了", target: "CAMUS" },
                { text: "签约。然后分析契约漏洞，反手杀掉诱惑者", target: "BORGES" }
            ] },
            { id: 21, text: "你被困在只有向上阶梯的枯塔，怪兽在后：", options: [
                { text: "加快脚步。维持攀爬的挺拔姿态是我的主权", target: "HEMINGWAY" },
                { text: "停下。如果阶梯无限，那么每一级都是终点", target: "BORGES" },
                { text: "转身冲向黑暗。既然逃不掉，不如直接面对", target: "CAMUS" },
                { text: "坐在台阶上，记录墙面上那些斑驳的纹理", target: "WOOLF" }
            ] },
            { id: 22, text: "如果你发现爱过的人其实只是孤身一人的幻觉：", options: [
                { text: "继续爱。世界荒谬，幻觉就是我的唯一信仰", target: "CAMUS" },
                { text: "记录周期。找出背后的心理机制并建立图表", target: "BORGES" },
                { text: "感到彻骨苍凉。对着空气敬一杯冷掉的残茶", target: "EILEEN_CHANG" },
                { text: "亲吻幻觉。在那阵触碰中也有真实的温存感", target: "WOOLF" }
            ] },
            { id: 23, text: "当你置身于一个完全陌生的决定时刻，你倾向于：", options: [
                { text: "依靠直觉。在那阵生理悸动中认领我的决定", target: "LISPECTOR" },
                { text: "依靠公式。在纷繁因果中推导出唯一的解", target: "BORGES" },
                { text: "依靠责任。即便我不认同，也会为了道义承担", target: "HEMINGWAY" },
                { text: "依靠嘲讽。既然生活是荒诞的，怎么选都行", target: "CAMUS" }
            ] },
            { id: 24, text: "来到一座没有名字的枯塔，墙上的画正在流血：", options: [
                { text: "舔舐那种温度。确认这种痛苦的生理来源", target: "LISPECTOR" },
                { text: "写下批注。将恐怖转化为可被阅读的符号", target: "BORGES" },
                { text: "感到深深厌恶。这种非理性溢出威胁了系统", target: "KAFKA" },
                { text: "敬一杯酒。祝贺它终于在石墙里突围了", target: "CAMUS" }
            ] },
            { id: 25, text: "关于“真理”，你的直觉更倾向于认为：", options: [
                { text: "它是宇宙严密的编码。只要够清醒就能破解", target: "BORGES" },
                { text: "它是荒原的风。不可捕捉，但能让你颤栗", target: "WOOLF" },
                { text: "它是那道拒绝你进入的大门。你守着它就是", target: "KAFKA" },
                { text: "它是手里最后一支烟。抽完它你就看透了", target: "CAMUS" }
            ] },
            { id: 26, text: "如果你的影子打算离开你独自生活，你会：", options: [
                { text: "写生存指南。这是两个独立灵魂的礼貌告别", target: "BORGES" },
                { text: "感到解脱。从此不再被某个确定性追随了", target: "CAMUS" },
                { text: "死死踩住它。这种系统的叛逃绝不能被允许", target: "KAFKA" },
                { text: "看着它消失。品味那种剔骨般的苍凉感", target: "EILEEN_CHANG" }
            ] },
            { id: 27, text: "面对命运中那股压抑的、不给解释的沉默，你会：", options: [
                { text: "拔出长剑。向那片虚无发起一场尊严挑战", target: "HEMINGWAY" },
                { text: "狂笑。所谓神也不过是某种苍白的虚构逻辑", target: "KAFKA" },
                { text: "隐退。走向荒原。在没人认识的地方认领主权", target: "CAMUS" },
                { text: "闭上眼。用感知的灵光去发明一个神圣瞬间", target: "WOOLF" }
            ] },
            { id: 28, text: "如果你面前有一道门，门后是失去的一切，你会：", options: [
                { text: "坚决不进。失去才是对拥有最好的防腐处理", target: "EILEEN_CHANG" },
                { text: "在门外先研究一下这些‘失去’的分类标准", target: "BORGES" },
                { text: "深吸一口气推门进去。我要找回我的尊严", target: "HEMINGWAY" },
                { text: "坐在门槛上哭一会儿。这种幻灭感真让人沉醉", target: "KAFKA" }
            ] },
            { id: 29, text: "生命将尽。你会如何评价这长达一生、守在门外的徒劳？", options: [
                { text: "“终于明白了。根本没有门，是我自己囚禁了自己。”", target: "KAFKA" },
                { text: "“起身走向背后的荒野吧。世界宽广，我不必非进这扇门。”", target: "CAMUS" },
                { text: "“还是想弄清楚。守门人那句‘现在不行’背后的逻辑。”", target: "BORGES" },
                { text: "“编个美梦吧。假装已经进去了。这样死得比较体面。”", target: "EILEEN_CHANG" }
            ] },
            { id: 30, text: "最后，如果你一生的意识浓缩成了一件文学圣器。它会是：", options: [
                { text: "一把剖开伪善外壳的利刃", target: "KAFKA" },
                { text: "一架观测星体运行逻辑的望远镜", target: "BORGES" },
                { text: "一瓶装满了晚霞残影的墨水", target: "WOOLF" },
                { text: "一张永远折叠不完的灵魂地图", target: "CAMUS" }
            ] }
        ];

        const BrainJar = () => (
            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm opacity-90">
                <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke="#141312" strokeWidth="2.5" />
                <path d="M160 110 L240 110" stroke="#141312" strokeWidth="1" />
                <g transform="translate(180, 180)">
                    <path d="M0 20 Q 20 0 40 20 Q 60 40 40 60 Q 20 80 0 60 Q -20 40 0 20" fill="#cfceff" opacity="0.4" />
                    <path d="M10 35 Q 20 25 30 35" fill="none" stroke="#141312" strokeWidth="1" />
                    <path d="M15 50 Q 20 45 25 50" fill="none" stroke="#141312" strokeWidth="1" />
                </g>
                <circle cx="350" cy="55" r="28" fill="#e8ed2a" opacity="0.6" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [dynamicStats, setDynamicStats] = useState({ q: 0, l: 0, r: 0, a: 0 });
            const [isSaving, setIsSaving] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores: { ...scores }, currentQ }]);
                setScores(newScores);

                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(currentQ + 1);
                    window.scrollTo(0, 0);
                } else {
                    finishQuiz(newScores);
                }
            };

            const finishQuiz = (finalScores) => {
                const topTarget = Object.keys(finalScores).reduce((a, b) => finalScores[a] > finalScores[b] ? a : b, "BORGES");
                const res = ARCHETYPES[topTarget] || ARCHETYPES.BORGES;
                const qP = Math.min(96, 40 + (finalScores.WOOLF || 0)*12 + (finalScores.LISPECTOR || 0)*8);
                const lP = Math.min(96, 40 + (finalScores.BORGES || 0)*15 + (finalScores.CHRISTIE || 0)*10);
                const rP = Math.min(96, 40 + (finalScores.CAMUS || 0)*14 + (finalScores.HEMINGWAY || 0)*12);
                const awk = (88 + (qP + lP + rP) / 35).toFixed(1);
                setDynamicStats({ q: qP, l: lP, r: rP, a: awk });
                setResult(res);
                setStep('result');
                window.scrollTo(0, 0);
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history.pop();
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory([...history]);
                } else { setStep('welcome'); }
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    const ctx = radarCanvas.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['理式', '感质', '意志', '灵气', '韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(53, 175, 203, 0.12)',
                                borderColor: '#35afcb',
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: { r: { grid: { color: 'rgba(0,0,0,0.04)' }, pointLabels: { font: { size: 10, family: 'Inter', weight: 'bold' } }, ticks: { display: false }, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in space-y-12 pt-10 text-center text-center">
                            <div className="text-left">
                                <h1 className="text-5xl font-black tracking-tight text-[#000000] leading-tight text-center md:text-left">寻找你的<br /><span className="highlight-yellow">文学原型</span></h1>
                                <p className="text-[10px] font-bold text-gray-400 mt-4 uppercase tracking-[0.3em] text-center md:text-left">Arché Narrative Lab // 2026 Archive</p>
                            </div>
                            <div className="w-full max-w-[240px] mx-auto opacity-90 grayscale contrast-125"><BrainJar /></div>
                            <div className="space-y-12 text-center">
                                <div className="text-left border-l-4 border-[#e8ed2a] pl-5 space-y-4 text-left">
                                    <p className="text-lg font-bold leading-relaxed text-[#3a3833]">基于 20 位世界宗师的精神切片，关于“人性临界处”的行为测绘。</p>
                                    <p className="text-xs text-gray-500 font-medium text-left italic">“文学并非点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <button onClick={() => setStep('quiz')} className="w-full py-6 bg-[#141312] text-white text-xs tracking-[1.2em] font-bold active:scale-95 transition-all uppercase rounded-sm">激活档案库 / START</button>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10">
                            <div className="flex justify-between items-center pb-5 border-b border-black/5">
                                <button onClick={handleBack} className="text-[10px] font-bold text-gray-300 hover:text-black uppercase tracking-widest px-2 py-1 bg-black/5 rounded transition-all">← BACK</button>
                                <span className="text-[10px] font-bold text-[#35afcb] uppercase font-mono tracking-tighter">Archive {String(currentQ + 1).padStart(2, '0')} / 30</span>
                                <div className="w-1/3 h-1 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-black transition-all" style={{ width: `${((currentQ + 1)/30)*100}%` }}></div></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-semibold leading-[1.4] text-[#141312] tracking-tight pt-4 px-2 text-left">
                                {QUESTIONS[currentQ].text}
                            </h2>
                            <div className="space-y-4 pt-4 text-left text-left">
                                {QUESTIONS[currentQ].options.map((option, idx) => (
                                    <div key={idx} onClick={() => handleAnswer(option.target)} className="option-card text-left">
                                        <span className="text-sm md:text-base font-light leading-relaxed text-[#2a2825]">{option.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-10 pb-20 text-center">
                            <div ref={captureRef} className="p-4 space-y-10 bg-[#f2f0e9]">
                                {/* 顶部还原 */}
                                <div className="text-center space-y-4 pt-12 bg-white border border-[#dcd8cf] rounded-sm relative overflow-hidden pb-10">
                                    <span className="text-[8px] font-bold uppercase tracking-[0.5em] text-[#35afcb] block text-center">Literature Archetype Profile</span>
                                    <h2 className="text-4xl font-bold text-[#3a3833] tracking-widest text-center">{result.name}</h2>
                                    <p className="text-[10px] text-[#35afcb] italic tracking-[0.3em] font-medium uppercase text-center">{result.sub}</p>
                                    <div className="flex justify-center gap-2 pt-4">
                                        <span className="px-2 py-1 border border-gray-300 text-[8px] font-bold">思辨觉醒度 {dynamicStats.a}%</span>
                                        <span className="px-2 py-1 bg-[#3a3833] text-white text-[8px] font-bold uppercase font-sans text-center">Validated</span>
                                    </div>
                                </div>

                                {/* 数据卡片还原 */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-8 border border-[#dcd8cf] rounded-2xl shadow-sm relative text-left">
                                    <div className="tag-soul">NO. 2026-SOUL</div>
                                    <div className="space-y-6">
                                        <h4 className="text-[9px] font-black border-b pb-2 italic tracking-widest text-gray-300 uppercase text-left">基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-6 text-left">
                                            {[["感质驱动", dynamicStats.q, "#e8ed2a"], ["理式逻辑", dynamicStats.l, "#35afcb"], ["反叛意志", dynamicStats.r, "#000000"]].map(([lbl, val, clr]) => (
                                                <div key={lbl} className="space-y-1">
                                                    <div className="flex justify-between text-[8px] font-bold uppercase tracking-tight text-gray-400 text-left"><span>{lbl}</span></div>
                                                    <div className="progress-bar-thin"><div className="progress-fill-thin" style={{width: `${val}%`, backgroundColor: clr}}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[160px] mx-auto text-center"><canvas ref={radarCanvas}></canvas></div>
                                </div>

                                {/* 金句 */}
                                <div className="relative p-10 bg-white border border-[#dcd8cf] text-center shadow-sm text-center">
                                    <p className="text-lg leading-relaxed mb-6 font-medium italic text-[#3a3833] text-center"><span className="highlight-yellow">“{result.quote}”</span></p>
                                    <div className="text-[10px] text-gray-400 tracking-widest uppercase font-bold text-center">— {result.name} —</div>
                                </div>

                                {/* 解剖详情 */}
                                <div className="space-y-10 px-2 text-left text-left">
                                    <section className="space-y-4 text-left">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.4em] border-b border-[#dcd8cf] pb-2 text-gray-400 text-left">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-[12px] border-[#35afcb] space-y-8 shadow-sm rounded-r-xl text-left text-left">
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 text-left">文学原型界定</span>
                                                <p className="text-sm leading-relaxed text-gray-500 font-bold italic text-left">“{result.identity}”</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 uppercase font-sans text-left">写作偏好建议 (WRITING STYLE)</span>
                                                <p className="text-xs leading-relaxed font-medium text-[#d14d42] bg-red-50/20 p-3 rounded-sm italic text-left">“{result.writing}”</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 text-left">精神症候解剖 (SYMPTOM)</span>
                                                <p className="text-xs leading-relaxed text-gray-500 text-left">{result.symptom}</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 text-left">叙事建议 (COUNSEL)</span>
                                                <p className="text-base leading-relaxed font-bold text-[#35afcb] text-left">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-4 text-left text-left">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.4em] border-b border-[#dcd8cf] pb-2 text-red-200 text-left">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                                            <div className="p-6 bg-red-50/40 border border-red-100 rounded-sm text-left text-left">
                                                <span className="text-[9px] font-bold text-red-700 block mb-2 uppercase text-left text-left">主导焦虑</span>
                                                <p className="text-xs text-red-900 font-medium text-left">{result.anxiety || "暂时无法读取"}</p>
                                            </div>
                                            <div className="p-6 bg-gray-50/50 border border-gray-100 rounded-sm text-left text-left">
                                                <span className="text-[9px] font-bold text-gray-400 block mb-2 uppercase text-left text-left">阴影面</span>
                                                <p className="text-xs text-gray-600 text-left">{result.shadow || "未被观测"}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6 text-left text-left">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.4em] border-b border-gray-200 pb-2 text-gray-300 text-left text-left">思想进阶书单推荐 / READINGS</h4>
                                        <div className="grid gap-4 text-left">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="book-card shadow-sm hover:shadow-md transition-shadow text-left text-left">
                                                    <h5 className="text-sm font-bold mb-1 text-[#3a3833]">{book.title}</h5>
                                                    <p className="text-[8px] font-bold text-[#a4c29b] mb-1 uppercase">作者: {book.author}</p>
                                                    <p className="text-[9px] text-gray-500 italic leading-relaxed text-left">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <div className="pt-10 space-y-4 px-10 text-center text-center">
                                <button onClick={() => {
                                    setIsSaving(true);
                                    html2canvas(captureRef.current, { scale: 2, useCORS: true }).then(canvas => {
                                        const link = document.createElement('a');
                                        link.download = `文学报告-${result.name}.png`;
                                        link.href = canvas.toDataURL(); link.click();
                                        setIsSaving(false);
                                    });
                                }} className="w-full py-6 bg-[#141312] text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center">{isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({}); setCurrentQ(0); }} className="w-full py-6 border-2 border-[#141312] text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm text-center text-center">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40 text-center text-center">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold text-center">A Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2 text-center text-center">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
