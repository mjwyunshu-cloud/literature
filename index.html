                    // 计算动态叙事基因百分比
                    // Qualia: 感知与审美类作家 (Woolf, Proust, Duras, Lispector, Sagan, Eileen Chang)
                    const qualiaScore = (newScores.WOOLF || 0) + (newScores.PROUST || 0) + (newScores.DURAS || 0) + (newScores.LISPECTOR || 0) + (newScores.SAGAN || 0) + (newScores.EILEEN_CHANG || 0);
                    // Logic: 逻辑与建构类作家 (Borges, Christie, Joyce, Atwood)
                    const logicScore = (newScores.BORGES || 0) + (newScores.CHRISTIE || 0) + (newScores.JOYCE || 0) + (newScores.ATWOOD || 0);
                    // Rebellion: 反叛与存在类作家 (Kafka, Camus, Hemingway, Beauvoir, Plath, Morrison)
                    const rebellionScore = (newScores.KAFKA || 0) + (newScores.CAMUS || 0) + (newScores.HEMINGWAY || 0) + (newScores.BEAUVOIR || 0) + (newScores.PLATH || 0) + (newScores.MORRISON || 0);
                    
                    const totalRelevant = Math.max(1, qualiaScore + logicScore + rebellionScore);
                    
                    // 模拟权重映射到进度条
                    const qualiaPct = Math.min(95, Math.max(30, (qualiaScore / 12) * 100 + (Math.random() * 15)));
                    const logicPct = Math.min(95, Math.max(30, (logicScore / 10) * 100 + (Math.random() * 15)));
                    const rebellionPct = Math.min(95, Math.max(30, (rebellionScore / 12) * 100 + (Math.random() * 15)));
                    
                    // 觉醒度计算：基于主要维度的综合值，确保个性化且维持在高水平
                    const awakening = 88 + (qualiaPct + logicPct + rebellionPct) / 30;

                    setDynamicStats({
                        qualia: Math.round(qualiaPct),
                        logic: Math.round(logicPct),
                        rebellion: Math.round(rebellionPct),
                        awakening: awakening.toFixed(1)
                    });

                    setResult(resData);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => { if (history.length > 0) { const last = history.pop(); setScores(last.scores); setCurrentQuestion(last.currentQuestion); setHistory([...history]); } else { setStep('welcome'); } };
            const handleRestart = () => { setStep('welcome'); setCurrentQuestion(0); setScores({ REBEL:0, SAGE:0, IDEALIST:0, WANDERER:0, HERO:0, KAFKA:0, CAMUS:0, LISPECTOR:0, BORGES:0, HEMINGWAY:0, WOOLF:0, EILEEN_CHANG:0, DICKINSON:0, BEAUVOIR:0, CHRISTIE:0, MARQUEZ:0, DURAS:0, HESSE:0, MURAKAMI:0, MORRISON:0, ATWOOD:0, JOYCE:0, SAGAN:0, PROUST:0 }); setHistory([]); setResult(null); setCode(""); window.scrollTo(0, 0); };

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `文学报告-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['批判逻辑', '智性深度', '审美欲', '自由意志', '精神韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(53, 175, 203, 0.12)',
                                borderColor: COLORS.accentBlue,
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(0,0,0,0.05)' },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    pointLabels: { font: { size: 10, family: 'Noto Serif SC', weight: 'bold' }, color: COLORS.textSecondary },
                                    ticks: { display: false },
                                    min: 0, max: 100
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#35afcb] text-white text-[9px] tracking-widest font-sans mb-4 transform -rotate-2 uppercase">Archetypal Assessment</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-[#3a3833]">寻找你的<br /><span className="font-bold border-b-4 border-[#e8ed2a]">文学原型</span></h1>
                            </div>
                            <div className="w-full max-w-[340px] mx-auto aspect-[4/3.5] relative opacity-80">
                                <JarIllustration />
                            </div>
                            <div className="space-y-10">
                                <div className="space-y-4 px-4 text-left border-l-2 border-[#e8ed2a] pl-4">
                                    <p className="text-[13px] text-[#3a3833] leading-relaxed font-bold tracking-widest underline decoration-[#e8ed2a] decoration-4 underline-offset-4">基于20位文学宗师的精神切片，进行关于“人性临界处”的行为测绘。</p>
                                    <p className="text-xs text-[#6d6b64] leading-relaxed tracking-wider font-light italic">“文学并非修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={`space-y-4 ${showError ? 'shake' : ''}`}>
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold font-sans">通行码认证 / ACCESS CODE</span>
                                        <input type="text" value={code} onChange={(e) => setCode(e.target.value)} className="redeem-input w-48 py-2 text-sm text-center" placeholder="请输入通行码解锁测试" />
                                    </div>
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#3a3833] text-white text-[11px] tracking-[0.8em] font-bold active:scale-95 transition-all shadow-xl text-center">开启审视 / START</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em] font-sans text-center">Arché 思想铺子实验室出品</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10 text-center">
                            <div className="flex justify-between items-center border-b border-[#dcd8cf] pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest">BACK</button>
                                <span className="text-[9px] uppercase text-[#6d6b64] font-black tracking-widest opacity-40">COORDINATE {String(currentQuestion + 1).padStart(2, '0')} / 30</span>
                                <div className="w-10"></div>
                            </div>
                            
                            <div className="w-full text-left bg-[#3a383308] p-6 border-l-4 border-[#3a383333]">
                                <div className="flex items-baseline gap-2 mb-3">
                                    <span className="text-[10px] font-bold bg-[#3a3833] text-white px-2 py-0.5 rounded-sm font-sans whitespace-nowrap uppercase">文学背景</span>
                                    <span className="text-[13px] font-bold opacity-80">{QUESTIONS[currentQuestion].origin}</span>
                                </div>
                                <p className="text-[12px] leading-relaxed text-[#a4c29b] mb-3 font-medium italic opacity-80">“{QUESTIONS[currentQuestion].background}”</p>
                                <div className="flex items-baseline gap-2 pt-2 border-t border-[#3a383315]">
                                    <span className="text-[8px] font-bold border border-[#3a383333] px-1.5 py-0.5 uppercase opacity-50 font-sans tracking-widest">核心论题</span>
                                    <span className="text-[10px] opacity-40 font-medium">{QUESTIONS[currentQuestion].reading}</span>
                                </div>
                            </div>

                            <h2 className="text-[19px] md:text-[22px] font-bold leading-[1.6] text-[#3a3833] text-left border-t border-[#dcd8cf] pt-6 tracking-tight">
                                {QUESTIONS[currentQuestion].text}
                            </h2>

                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map((option, idx) => (
                                    <button key={idx} onClick={() => handleAnswer(option.target)} className="w-full p-6 bg-white bg-opacity-70 rounded-sm border border-[#dcd8cf] hover:border-[#3a3833] transition-all group active:bg-white text-left shadow-sm">
                                        <span className="text-[15px] text-[#6d6b64] group-hover:text-[#3a3833] leading-relaxed pr-4 font-medium">{option.text}</span>
                                    </button>
                                ))}
                            </div>
                            
                            <div className="pt-6 flex justify-center">
                                <div className="h-[1px] w-full bg-[#dcd8cf] relative opacity-50">
                                    <div className="h-full bg-[#3a3833] transition-all duration-700" style={{ width: `${((currentQuestion + 1) / 30) * 100}%` }}></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#f2f0e9]">
                                <div className="text-center space-y-6 py-12 bg-white border border-[#dcd8cf] rounded-sm shadow-sm relative overflow-hidden">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#35afcb] font-sans">Literature Archetype Profile</span>
                                    <h2 className="text-5xl font-bold text-[#3a3833] tracking-widest">{result.name}</h2>
                                    <p className="text-sm text-[#35afcb] italic tracking-[0.4em] font-sans">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4">
                                        {/* 修改1：动态觉醒度数值 */}
                                        <span className="px-3 py-1 border border-[#3a3833] text-[9px] font-bold uppercase font-sans tracking-widest">思辨觉醒度 {dynamicStats.awakening}%</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[9px] font-bold uppercase font-sans tracking-widest">主体性存证</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl relative">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-white border border-[#3a3833] text-[10px] font-bold transform rotate-3 shadow-sm font-sans uppercase">NO. 2026-SOUL</div>
                                    <div className="space-y-4 text-left font-sans">
                                        <h4 className="text-[11px] font-bold border-b pb-2 text-left italic tracking-widest">叙事基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-3 text-[10px]">
                                            {/* 修改2：动态进度条宽度 */}
                                            <div className="flex justify-between items-center uppercase"><span>感质驱动</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#e8ed2a] transition-all duration-1000" style={{width: `${dynamicStats.qualia}%`}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>理式逻辑</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#35afcb] transition-all duration-1000" style={{width: `${dynamicStats.logic}%`}}></div></div></div>
                                            <div className="flex justify-between items-center uppercase"><span>反叛意志</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-black transition-all duration-1000" style={{width: `${dynamicStats.rebellion}%`}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto text-center">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                </div>

                                <div className="relative p-12 bg-white border border-[#dcd8cf] text-center shadow-sm">
                                    <p className="text-xl md:text-2xl leading-relaxed mb-6 font-medium italic text-[#3a3833]"><span className="highlight-yellow">“{result.quote}”</span></p>
                                    <div className="text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold font-sans">— {result.name} —</div>
                                </div>

                                <div className="space-y-10 px-2 text-left font-sans">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans tracking-widest">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-4 border-[#35afcb] space-y-5">
                                            <div>
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-widest">文学原型界定</span>
                                                <p className="text-[13px] leading-relaxed text-[#6d6b64] italic font-bold">“{result.identity}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">叙事风格特征 (Writing Style)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#d14d42] bg-red-50 p-3 rounded-sm italic">“{result.writing}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">临床症候分析 (Symptom)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.symptom}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1 uppercase font-sans tracking-widest">主体性指引 (Counsel)</span>
                                                <p className="text-[13px] leading-relaxed font-medium text-[#35afcb]">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4 text-left font-sans">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 tracking-widest">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-red-50 border border-red-100 rounded text-left">
                                                <div className="font-bold mb-1 uppercase tracking-widest text-red-700">核心焦虑</div>
                                                <div className="opacity-70 font-sans">{result.anxiety}</div>
                                            </div>
                                            <div className="p-4 bg-gray-50 border border-gray-100 rounded text-left">
                                                <div className="font-bold mb-1 uppercase tracking-widest">意识阴影</div>
                                                <div className="opacity-70 font-sans">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans tracking-widest">思想进阶书单推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="bg-white p-6 border border-[#dcd8cf] relative group shadow-sm text-left font-sans transition-all hover:bg-gray-50 rounded-xl">
                                                    <h5 className="text-[15px] font-bold mb-1">{book.title}</h5>
                                                    <p className="text-[10px] text-[#a4c29b] font-bold mb-2 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-[#6d6b64] italic leading-relaxed opacity-80">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] flex items-center justify-center gap-3 shadow-xl active:bg-gray-800 disabled:opacity-50 transition-all font-sans rounded-sm">{isSaving ? "生成报告中..." : "保存灵魂手稿报告 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all font-sans active:scale-95">再次重启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4">
                        <div className="lab-signature flex flex-col items-center text-center">
                            <div className="text-[8px] text-[#999] tracking-[0.2em] uppercase mb-1 font-sans">A Digital Narrative Lab</div>
                            <div className="text-[12px] font-bold text-[#3a3833] tracking-[0.1em] border-b-2 border-[#3a3833] pb-0.5 px-1 font-sans">Arché 思想铺子</div>
                        </div>
                        <p className="text-[9px] tracking-[0.3em] uppercase text-[#6d6b64] opacity-40 font-sans mt-4 italic">为精神生长提供坐标 / Mapping Mental Growth</p>
                    </footer>
                </div>
            );
        }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
    </script>
</body>
</html>
