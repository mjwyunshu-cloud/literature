                { text: "将它文学化。既然它已存在，不如让它美得凄凉", target: "EILEEN_CHANG" },
                { text: "淡忘它。它只是我作为动物性余留的、一个报错符号", target: "KAFKA" }
            ] },
            { id: 25, origin: "词语的边界", background: "语言的界限即世界的界限。", text: "你认为语言最大的功能是：", reading: "符号哲学", options: [
                { text: "欺骗。为了在残酷的真实面前，维持一点生存的体面", target: "BORGES" },
                { text: "控诉。为了让那些被异化的痛苦，留下一点声音", target: "KAFKA" },
                { text: "招魂。为了让那些消失的瞬间，在记忆里复活", target: "PROUST" },
                { text: "游戏。为了在那阵轻盈的组合中，调侃这个沉重的宇宙", target: "CALVINO" }
            ] },
            { id: 26, origin: "结局预测", background: "落幕时的姿态。", text: "如果你知道这个世界明天就会终结，你今天会：", reading: "终局决策", options: [
                { text: "依旧在那儿推我的石头。这种坚持就是我对终结的嘲讽", target: "CAMUS" },
                { text: "在一本精美的本子上，写下我最后一处逻辑修正", target: "BORGES" },
                { text: "去爱，去发疯，去体验那阵极致的崩溃与颤动", target: "LISPECTOR" },
                { text: "整理一下领口。死也要死得像个有站姿的人", target: "HEMINGWAY" }
            ] },
            { id: 27, origin: "身份错位", background: "有时候为了在现实中生存，我们不得不‘扮演’一个体面但虚假的自己。", text: "当你意识到自己正在做一个完全不像自己、甚至令你厌恶的举动时，你会：", reading: "身份博弈", options: [
                { text: "感到极度的内耗。我担心这个虚伪的影子会最终彻底吃掉真实的我", target: "KAFKA" },
                { text: "冷静观察。将其视为我生存博弈中必须使用的符号，理智上我依然清醒", target: "BORGES" },
                { text: "报以自嘲的一笑。既然生活本身就是荒谬的，那个陌生的我反而给了我撤离的自由", target: "CAMUS" },
                { text: "这种伪装让我恶心。我会想办法打碎这种体面，哪怕代价是被彻底孤立", target: "NABOKOV" }
            ] },
            { id: 28, origin: "麦田守望", background: "守护那一点摇摇欲坠的纯真。", text: "你觉得这个世界的真相是：", reading: "真实性判断", options: [
                { text: "一堆废墟。我们只是在那里寻找偶尔发光的垃圾", target: "EILEEN_CHANG" },
                { text: "一个迷宫。由于我们的无知，它才显得如此复杂", target: "BORGES" },
                { text: "一个审判场。我们从出生起就在那儿等待判决书", target: "KAFKA" },
                { text: "一汪死水。由于我们的搅动，它才有了涟漪", target: "WOOLF" }
            ] },
            { id: 29, origin: "出走时刻", background: "背离现有的坐标。", text: "当你决定出走时，你会：", reading: "流浪意志", options: [
                { text: "不带任何行李。我不想让任何过去的东西成为我的锚", target: "CAMUS" },
                { text: "带上一本精密的地图。虽然它是虚构的，但能让我心安", target: "BORGES" },
                { text: "在大门口大笑三声。这是我对这个旧家的最后告别", target: "SALINGER" },
                { text: "在行李里藏一朵干枯的花。这是我唯一的苍凉温存", target: "EILEEN_CHANG" }
            ] },
            { id: 30, origin: "终极圣器", background: "意识的物化形态。", text: "如果你一生的意识最后成了一件圣器，它会是：", reading: "本质归位", options: [
                { text: "一把剖开虚伪表皮的利刃", target: "KAFKA" },
                { text: "一架观测星体逻辑的望远镜", target: "BORGES" },
                { text: "一个装满了晚霞残影的墨水瓶", target: "WOOLF" },
                { text: "一张永远折叠不完的灵魂地图", target: "CAMUS" }
            ] }
        ];

        const BrainJar = () => (
            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm opacity-90">
                <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke="#141312" strokeWidth="2.5" />
                <path d="M160 110 L240 110" stroke="#141312" strokeWidth="1" />
                <g transform="translate(180, 180)">
                    <path d="M0 20 Q 20 0 40 20 Q 60 40 40 60 Q 20 80 0 60 Q -20 40 0 20" fill="#cfceff" opacity="0.4" />
                    <path d="M10 35 Q 20 25 30 35" fill="none" stroke="#141312" strokeWidth="1" />
                    <path d="M15 50 Q 20 45 25 50" fill="none" stroke="#141312" strokeWidth="1" />
                </g>
                <circle cx="350" cy="55" r="28" fill="#e8ed2a" opacity="0.6" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [dynamicStats, setDynamicStats] = useState({ q: 0, l: 0, r: 0, a: 0 });
            const [isSaving, setIsSaving] = useState(false);
            const [code, setCode] = useState("");
            const [showError, setShowError] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);

            const handleVerify = () => {
                if (code.toLowerCase().trim() === "cloud") setStep('quiz');
                else { setShowError(true); setTimeout(() => setShowError(false), 500); }
            };

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores: { ...scores }, currentQ }]);
                setScores(newScores);

                if (currentQ < QUESTIONS.length - 1) {
                    setTimeout(() => {
                        setCurrentQ(currentQ + 1);
                        window.scrollTo(0, 0);
                    }, 100);
                } else {
                    const topTarget = Object.keys(newScores).reduce((a, b) => (newScores[a] || 0) > (newScores[b] || 0) ? a : b);
                    const res = ARCHETYPES[topTarget] || ARCHETYPES.BORGES;
                    
                    const qP = Math.min(96, 45 + (newScores.WOOLF || 0)*12 + (newScores.LISPECTOR || 0)*8 + (newScores.EILEEN_CHANG || 0)*8);
                    const lP = Math.min(96, 45 + (newScores.BORGES || 0)*15 + (newScores.CHRISTIE || 0)*10 + (newScores.CALVINO || 0)*8);
                    const rP = Math.min(96, 45 + (newScores.CAMUS || 0)*14 + (newScores.HEMINGWAY || 0)*12 + (newScores.KAFKA || 0)*10);
                    const awk = (88 + (qP + lP + rP) / 35).toFixed(1);
                    setDynamicStats({ q: qP, l: lP, r: rP, a: awk });
                    setResult(res);
                    setStep('result');
                    window.scrollTo(0,0);
                }
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history.pop();
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory([...history]);
                } else { setStep('welcome'); }
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    const ctx = radarCanvas.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['理式', '感质', '意志', '灵气', '韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(53, 175, 203, 0.12)',
                                borderColor: '#35afcb',
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: { r: { grid: { color: 'rgba(0,0,0,0.04)' }, pointLabels: { font: { size: 9, weight: '600' } }, ticks: { display: false }, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen text-center">
                    {step === 'welcome' && (
                        <div className="animate-fade-in space-y-12 pt-10">
                            <div className="text-left">
                                <h1 className="text-4xl font-black tracking-tight text-[#000000] leading-tight text-center md:text-left">寻找你的<br /><span className="highlight-yellow">文学原型</span></h1>
                                <p className="text-[9px] font-bold text-gray-400 mt-4 uppercase tracking-[0.3em] text-center md:text-left">Arché Narrative Lab // 2026 Archive Project</p>
                            </div>
                            <div className="w-full max-w-[220px] mx-auto opacity-90 grayscale contrast-125"><BrainJar /></div>
                            <div className="space-y-12">
                                <div className="text-left border-l-4 border-[#e8ed2a] pl-5 space-y-4">
                                    <p className="text-base font-bold leading-relaxed text-[#3a3833]">基于 20 位文学宗师的精神切片，进行一次关于“生存站姿”的深度测算。</p>
                                    <p className="text-[11px] text-gray-500 font-medium text-left italic">“文学并非修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={`flex flex-col items-center gap-4 ${showError ? 'shake' : ''}`}>
                                    <span className="text-[9px] uppercase tracking-[0.3em] opacity-40 font-bold">通行码认证 / ACCESS CODE</span>
                                    <input type="text" value={code} onChange={(e) => setCode(e.target.value)} className="redeem-input w-48 py-2 text-sm text-center" placeholder="ENTER CODE" />
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#141312] text-white text-xs tracking-[1.2em] font-bold active:scale-95 transition-all uppercase rounded-sm">激活档案库 / START</button>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10">
                            <div className="flex justify-between items-center pb-5 border-b border-black/5">
                                <button onClick={handleBack} className="text-[9px] font-bold text-gray-300 hover:text-black uppercase tracking-widest px-2 py-1 bg-black/5 rounded transition-all">← BACK</button>
                                <span className="text-[9px] font-bold text-[#35afcb] uppercase font-mono tracking-tighter">Archive {String(currentQ + 1).padStart(2, '0')} / 30</span>
                                <div className="w-1/3 h-1 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-black transition-all" style={{ width: `${((currentQ + 1)/30)*100}%` }}></div></div>
                            </div>
                            
                            <div className="w-full text-left bg-[#3a383305] p-6 border-l-4 border-[#3a383320] space-y-4">
                                <div className="flex items-baseline gap-2">
                                    <span className="text-[9px] font-bold bg-[#3a3833] text-white px-2 py-0.5 rounded-sm uppercase">文学背景</span>
                                    <span className="text-xs font-bold opacity-80">{QUESTIONS[currentQ].origin}</span>
                                </div>
                                <p className="text-[12px] leading-relaxed text-[#a4c29b] font-medium italic">“{QUESTIONS[currentQ].background}”</p>
                                <div className="pt-2 border-t border-[#3a383310]">
                                    <span className="text-[8px] font-bold border border-[#3a383330] px-1.5 py-0.5 uppercase opacity-50 tracking-widest">核心论题: {QUESTIONS[currentQ].reading}</span>
                                </div>
                            </div>

                            <h2 className="text-lg md:text-xl font-semibold leading-[1.6] text-[#141312] tracking-tight pt-4 px-2 text-left">
                                {QUESTIONS[currentQ].text}
                            </h2>
                            <div className="space-y-3 pt-4">
                                {QUESTIONS[currentQ].options.map((option, idx) => (
                                    <div key={idx} onClick={() => handleAnswer(option.target)} className="option-card">
                                        <span className="text-[13px] md:text-sm font-light leading-relaxed text-[#2a2825]">{option.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-12 pb-20">
                            <div ref={captureRef} className="p-4 space-y-10 bg-[#f2f0e9]">
                                <div className="text-center space-y-3 pt-16 bg-white border border-[#dcd8cf] rounded-sm relative overflow-hidden pb-12">
                                    <div className="tag-soul">ARCHE-LOG-2026</div>
                                    <span className="text-[8px] font-bold uppercase tracking-[0.6em] text-[#35afcb] block text-center">Archetype Analysis Report</span>
                                    <h2 className="text-4xl font-bold text-[#3a3833] tracking-[0.2em] text-center my-4">{result.name}</h2>
                                    <p className="text-[10px] text-[#35afcb] italic tracking-[0.4em] font-medium uppercase text-center">— {result.sub} —</p>
                                    <div className="flex justify-center gap-3 pt-6">
                                        <span className="px-3 py-1 border border-gray-300 text-[8px] font-bold uppercase tracking-tighter">觉醒度 {dynamicStats.a}%</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[8px] font-bold uppercase">Identity Validated</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-10 border border-[#dcd8cf] rounded-3xl shadow-sm relative text-left">
                                    <div className="space-y-6 font-sans">
                                        <h4 className="text-[10px] font-black border-b border-gray-100 pb-2 italic tracking-widest text-gray-400 uppercase">叙事基因分析 / ARCHIVE</h4>
                                        <div className="space-y-6">
                                            {[["感质驱动 (QUALIA)", dynamicStats.q, "#e8ed2a"], ["理式逻辑 (LOGIC)", dynamicStats.l, "#35afcb"], ["反叛意志 (REBEL)", dynamicStats.r, "#000000"]].map(([lbl, val, clr]) => (
                                                <div key={lbl} className="space-y-2">
                                                    <div className="flex justify-between text-[8px] font-bold uppercase tracking-tight text-gray-500"><span>{lbl}</span><span>{val}%</span></div>
                                                    <div className="h-[3px] bg-gray-50 rounded-full"><div className="h-full transition-all duration-1000 ease-out rounded-full" style={{width: `${val}%`, backgroundColor: clr}}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[160px] mx-auto"><canvas ref={radarCanvas}></canvas></div>
                                </div>

                                <div className="relative p-12 bg-white border border-[#dcd8cf] text-center shadow-sm">
                                    <span className="quote-left">“</span>
                                    <p className="text-lg md:text-xl leading-relaxed mb-6 font-bold italic text-[#3a3833] text-center px-4"><span className="highlight-yellow">{result.quote}</span></p>
                                    <div className="text-[9px] text-gray-400 tracking-[0.4em] uppercase font-bold text-center">— {result.name} —</div>
                                </div>

                                <div className="space-y-12 px-2 text-left">
                                    <section className="space-y-6">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-gray-400">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-8 border-l-[12px] border-[#35afcb] space-y-8 shadow-sm rounded-r-2xl">
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-2 tracking-widest">文学原型界定 / ARCHETYPE IDENTITY</span>
                                                <p className="text-sm leading-relaxed text-gray-600 font-bold italic text-justified">{result.identity}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-6">
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-2 tracking-widest">叙事风格建议 / WRITING PROTOCOL</span>
                                                <p className="text-[11px] leading-relaxed font-medium text-[#d14d42] bg-red-50/30 p-4 rounded-lg italic">{result.writing}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-6">
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-2 tracking-widest">深层精神症候 / CLINICAL SYMPTOM</span>
                                                <p className="text-[11px] leading-relaxed text-gray-500 text-justified">{result.symptom}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-6">
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-2 tracking-widest">主体性生存建议 / EXISTENTIAL COUNSEL</span>
                                                <p className="text-[13px] leading-relaxed font-black text-[#35afcb]">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-300">意识阴影与核心焦虑 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-6 bg-red-50/50 border border-red-100 rounded-xl">
                                                <span className="text-[8px] font-bold text-red-600 block mb-2 uppercase tracking-widest">核心焦虑 / ANXIETY</span>
                                                <p className="text-[11px] text-red-900 font-medium">{result.anxiety || "暂时无法读取"}</p>
                                            </div>
                                            <div className="p-6 bg-gray-50/50 border border-gray-200 rounded-xl">
                                                <span className="text-[8px] font-bold text-gray-400 block mb-2 uppercase tracking-widest">潜在阴影 / SHADOW</span>
                                                <p className="text-[11px] text-gray-700">{result.shadow || "未被观测"}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.5em] border-b border-gray-200 pb-2 text-gray-300">思想进阶书单推荐 / READINGS</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="bg-white p-6 border border-[#dcd8cf] rounded-xl shadow-sm hover:shadow-md transition-all">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <h5 className="text-sm font-bold text-[#3a3833]">{book.title}</h5>
                                                        <span className="text-[7px] font-bold bg-[#a4c29b]/10 text-[#a4c29b] px-2 py-0.5 rounded-full uppercase">Recommend</span>
                                                    </div>
                                                    <p className="text-[8px] font-bold text-gray-400 mb-3 uppercase tracking-widest">作者: {book.author}</p>
                                                    <p className="text-[10px] text-gray-500 italic leading-relaxed text-justified">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <div className="pt-10 space-y-4 px-10">
                                <button onClick={() => {
                                    setIsSaving(true);
                                    html2canvas(captureRef.current, { scale: 2, useCORS: true }).then(canvas => {
                                        const link = document.createElement('a');
                                        link.download = `文学报告-${result.name}.png`;
                                        link.href = canvas.toDataURL(); link.click();
                                        setIsSaving(false);
                                    });
                                }} className="w-full py-6 bg-[#141312] text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center"> {isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({}); setCurrentQ(0); setHistory([]); setCode(""); }} className="w-full py-6 border-2 border-[#141312] text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold">Arché Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
