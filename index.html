                                    </div>
                                    <div className="border-t border-gray-50 pt-6">
                                        <span className="logic-label">临床症候 / Clinical Symptom</span>
                                        <p className="logic-p text-gray-500 text-justified">{result.symptom}</p>
                                    </div>
                                    <div className="border-t border-gray-50 pt-6">
                                        <span className="logic-label">生存建议 / Existential Counsel</span>
                                        <p className="logic-p font-black text-[#35afcb] text-justified">{result.counsel}</p>
                                    </div>
                                </div>

                                {/* SOUL/SHADOW 逻辑块 */}
                                <div className="result-card">
                                    <h4 className="section-header">灵魂分析 / THE SOUL</h4>
                                    <span className="logic-label">精神内核 / Internal Logic</span>
                                    <p className="logic-p italic text-justified">{result.soul.logic}</p>
                                    <span className="logic-label">人格显影 / Manifestation</span>
                                    <p className="logic-p text-justified">{result.soul.display}</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="result-card" style={{borderColor: '#ffdada', background: '#fffafa'}}>
                                        <h4 className="section-header" style={{color: '#d14d42'}}>阴影投射 / SHADOW</h4>
                                        <span className="logic-label">核心焦虑 / Anxiety</span>
                                        <p className="logic-p text-red-900 font-bold mb-0 text-justified">{result.anxiety || "无法识别"}</p>
                                        <div className="mt-6 border-t border-red-100 pt-4">
                                            <span className="logic-label">投影分析</span>
                                            <p className="text-[12px] leading-relaxed text-red-800 opacity-70 text-justified">{result.shadow.projection}</p>
                                        </div>
                                    </div>
                                    <div className="result-card">
                                        <h4 className="section-header">接纳与自洽 / ACCEPTANCE</h4>
                                        <span className="logic-label">阴影接纳 / Acceptance</span>
                                        <p className="logic-p mb-0 font-bold underline decoration-[#d14d42] underline-offset-4 text-justified">{result.shadow.acceptance}</p>
                                        <div className="mt-6 border-t border-gray-100 pt-4">
                                            <span className="logic-label">人格处方 / Prescription</span>
                                            <p className="text-[12px] leading-relaxed text-gray-600 italic font-medium text-justified">{result.self.prescription}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="result-card">
                                    <h4 className="section-header">思想进阶书单推荐 / READINGS</h4>
                                    <div className="grid gap-4">
                                        {result.self.books.map((book, i) => (
                                            <div key={i} className="book-item shadow-sm hover:shadow-md transition-all text-left">
                                                <span className="tag-recommend">Recommend</span>
                                                <h5 className="text-[15px] font-bold text-[#3a3833] mb-1">《{book.title}》</h5>
                                                <p className="text-[10px] font-bold text-[#a4c29b] uppercase mb-3 text-left">作者: {book.author}</p>
                                                <p className="text-[11px] text-[#888] leading-relaxed text-justified italic">{book.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="pt-10 space-y-4 px-6 text-center">
                                <button onClick={async () => {
                                    setIsSaving(true);
                                    const canvas = await html2canvas(captureRef.current, { scale: 2, useCORS: true });
                                    const link = document.createElement('a');
                                    link.download = `文学原型-${result.name}.png`;
                                    link.href = canvas.toDataURL(); link.click();
                                    setIsSaving(false);
                                }} className="w-full py-6 bg-black text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center"> {isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({ KAFKA:0, BORGES:0, CAMUS:0, WOOLF:0, EILEEN_CHANG:0, BEAUVOIR:0, SAGAN:0, WILDE:0, MURAKAMI:0 }); setCurrentIdx(0); setHistory([]); setCode(""); }} className="w-full py-6 border-2 border-black text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold">Arché Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
