        .option-content { font-size: 15px; font-weight: 500; color: #555; }

        .text-justified { text-align: justify; text-justify: inter-character; }

        .progress-fill { height: 100%; transition: width 1.5s ease-out; }

        .book-item { background: white; border: 1px solid #eee; border-radius: 12px; padding: 24px; margin-bottom: 16px; position: relative; }
        .tag-recommend { position: absolute; top: 20px; right: 20px; font-size: 8px; color: #a4c29b; border: 1px solid #a4c29b; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; font-weight: 900; }

                                        </div>
                                    </div>
                                    <div className="result-card">
                                        <h4 className="section-header">潜在阴影 / SHADOW</h4>
                                        <p className="logic-p mb-0">{result.shadow_text}</p>
                                        <div className="mt-6 border-t border-gray-100 pt-4">
                                            <span className="logic-label">接纳建议 / Acceptance</span>
                                            <p className="text-[12px] leading-relaxed text-gray-600 italic font-medium">{result.shadow.acceptance}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* READINGS 书单推荐 */}
                                <div className="result-card">
                                    <h4 className="section-header">思想进阶书单推荐 / READINGS</h4>
                                    <div className="grid gap-4">
                                        {result.self.books.map((book, i) => (
                                            <div key={i} className="book-item shadow-sm hover:shadow-md transition-all">
                                                <span className="tag-recommend">Recommend</span>
                                                <h5 className="text-[15px] font-bold text-[#3a3833] mb-1">《{book.title}》</h5>
                                                <p className="text-[10px] font-bold text-[#a4c29b] uppercase mb-3">作者: {book.author}</p>
                                                <p className="text-[11px] text-[#888] leading-relaxed text-justified italic">{book.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 保存与重启按钮 */}
                            <div className="pt-10 space-y-4 px-6 text-center">
                                <button onClick={async () => {
                                    setIsSaving(true);
                                    const canvas = await html2canvas(captureRef.current, { scale: 2, useCORS: true });
                                    const link = document.createElement('a');
                                    link.download = `文学报告-${result.name}.png`;
                                    link.href = canvas.toDataURL(); link.click();
                                    setIsSaving(false);
                                }} className="w-full py-6 bg-black text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center"> {isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({}); setCurrentIdx(0); setHistory([]); setCode(""); }} className="w-full py-6 border-2 border-black text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40 text-center">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold text-center">Arché Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2 text-center text-center text-center">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
