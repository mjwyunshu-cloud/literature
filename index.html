                { text: "“终于明白了。原来根本没有所谓的枷锁，是我自己把自己困死在了逻辑里”", target: "KAFKA" },
                { text: "“转身走。既然已见识过荒野。我就不再需要任何终点的合法性证明”", target: "CAMUS" },
                { text: "“守门人那句‘现在不行’背后，到底藏着什么因果诡计？我依然在推导”", target: "BORGES" },
                { text: "“编个美梦吧。假装已经赢了。既然生活是戏，就这样华丽地谢幕吧”", target: "EILEEN_CHANG" }
            ] },
            { id: 21, text: "当你的所有努力都被证明是为了一个错误的起点，你会：", options: [
                { text: "从容认错。承认起点的荒谬，但坚守过程中作为个体的每一个站姿", target: "CAMUS" },
                { text: "逻辑修正。将错就错地推导出一套能在终点自圆其说的复音系统", target: "BORGES" },
                { text: "深深自责。认为这种巨大的报错，是对我这一生平庸存在的最终审判", target: "KAFKA" },
                { text: "品味幻灭。在那阵剔骨般的苍凉感中，认领这片属于我个人的废墟", target: "EILEEN_CHANG" }
            ] },
            { id: 22, text: "关于“孤独”，你认为它最高级的形式是：", options: [
                { text: "深井。通过极致的自律，在平庸世界里挖掘出一个只属于我的秘密坐标", target: "MURAKAMI" },
                { text: "主权。在一个没人能理解的频率上，保持着对我内心王国的绝对统治", target: "DICKINSON" },
                { text: "透明。感到自我的边界彻底消失，化作一股吹过荒原、无所适从的风", target: "WOOLF" },
                { text: "游戏。在无限的虚构里，通过扮演无数个‘他者’来消解孤身的重量", target: "BORGES" }
            ] },
            { id: 23, text: "如果你发现自己正走在一条别人已经走过一万遍的旧路上：", options: [
                { text: "停下。既然路径已被走烂。我就没必要再参与这种平庸的系统报错", target: "KAFKA" },
                { text: "倒立。我要用一种报错的、非人的、带有嘲讽的姿势重新丈量这条路", target: "KAFKA" },
                { text: "切入。我要去一个没人去过的地方。认领我作为主体的叙事地平线", target: "CAMUS" },
                { text: "重叠。那是千万个灵魂留下的史诗纹理。这种时空压缩感让我着迷", target: "BORGES" }
            ] },
            { id: 24, text: "当你在极度的寂静中，开始能听见尘埃落地的声音，你会：", options: [
                { text: "恐慌。这种感官的过载正在撕裂我理智主体的边界。我在崩解", target: "WOOLF" },
                { text: "沉浸。在这种细微的、非人的、带有神性节律的音律中找到归宿", target: "LISPECTOR" },
                { text: "推导。我想弄清楚，尘埃动能与落地分贝之间的数学因果关联", target: "BORGES" },
                { text: "点火。用烟草的味道覆盖掉这种让人窒息的敏感。清醒是一种诅咒", target: "CAMUS" }
            ] },
            { id: 25, text: "如果你可以获得极致的才华，代价是交出灵魂里最温情的那一部分：", options: [
                { text: "签约。生命本就该在瞬间的爆炸中被确认为一团火。我只要那个时刻", target: "LISPECTOR" },
                { text: "拒绝。没有温度的才华，只不过是一台没有主权的、冰冷的打字机", target: "WOOLF" },
                { text: "决斗。我拒绝这种非逻辑的诱惑。尊严必须通过意志赢来。绝非契约", target: "HEMINGWAY" },
                { text: "反杀。通过法律逻辑分析契约漏洞。我打算在智力层面杀掉诱惑者", target: "BORGES" }
            ] },
            { id: 26, text: "当你发现天空正在向上空降落‘雨水’（意指常理的倾覆）：", options: [
                { text: "测量。拿出量杯。我想分析这种物理系统报错背后的算法偏差", target: "BORGES" },
                { text: "脱衣。让这种向上逆流的水流彻底洗净我这一身平庸的肉体皮囊", target: "LISPECTOR" },
                { text: "躲伞。我无法忍受任何违反常规秩序的宏大报错。它让我窒息", target: "KAFKA" },
                { text: "大笑。这世界终于荒诞得连规律都失效了。这下我彻底自由了", target: "CAMUS" }
            ] },
            { id: 27, text: "在一场华丽的晚宴上，盘底爬过一只肥硕的虱子：", options: [
                { text: "盯着。在这种对比中，这种肮脏有一种惊人的美。我共享这苍凉", target: "EILEEN_CHANG" },
                { text: "拨开。面无表情地继续读报纸。我要守住这一桌最体面的站姿", target: "HEMINGWAY" },
                { text: "内耗。这种微小的秩序崩坏，是对我生活结构最致命的破坏和报错", target: "KAFKA" },
                { text: "战栗。联想到文明本身也不过是包裹在肉身上的、一袭爬满蚤的旗袍", target: "LISPECTOR" }
            ] },
            { id: 28, text: "如果你的所有努力都被证明是为了一个错误的理想，你会：", options: [
                { text: "嘲笑。理想本身就是个智力陷阱。我看清了。我是那个唯一的幸存者", target: "CAMUS" },
                { text: "修正。在废墟上建立一套新的逻辑。我想弄清楚哪里出了因果偏差", target: "BORGES" },
                { text: "负罪。感到彻底的报错感。认为自己是理想崩解后的一个废弃零件", target: "KAFKA" },
                { text: "认领。在那阵剔骨般的幻灭里，守住我作为一个主体最后的苍凉风度", target: "EILEEN_CHANG" }
            ] },
            { id: 29, text: "历史终结前只能剩下一个词。你会为自己留下：", options: [
                { text: "“但是” —— 代表着反抗、翻转和否定所有确定性的最后张力", target: "KAFKA" },
                { text: "“因为” —— 守住人类对抗无序时，那最后一道逻辑的因果底线", target: "BORGES" },
                { text: "“也许” —— 为这个冰冷机械的世界，保留最后一点朦胧审美和涟漪", target: "WOOLF" },
                { text: "“再会” —— 既然此生荒诞。何不开启另一场未知的超越？我拒绝瘫痪", target: "CAMUS" }
            ] },
            { id: 30, text: "最后，如果你一生的意识只能浓缩成一件圣器。它会是：", options: [
                { text: "一把剖开格式化外壳的利刃。哪怕只有一次。我也刺痛过这个异化系统", target: "KAFKA" },
                { text: "一架观测星体逻辑的望远镜。我的一生都在观测上帝那幅未发表的地图", target: "BORGES" },
                { text: "一瓶装满了晚霞残影的墨水。将消失的时间固化为永恒的、震颤的文字", target: "WOOLF" },
                { text: "一张永远折叠不完的灵魂地图。我一直在通往荒野的路上。拒绝被定型", target: "CAMUS" }
            ] }
        ];

        const BrainJar = () => (
            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm opacity-90">
                <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke="#141312" strokeWidth="2.5" />
                <path d="M160 110 L240 110" stroke="#141312" strokeWidth="1" />
                <g transform="translate(180, 180)">
                    <path d="M0 20 Q 20 0 40 20 Q 60 40 40 60 Q 20 80 0 60 Q -20 40 0 20" fill="#cfceff" opacity="0.4" />
                    <path d="M10 35 Q 20 25 30 35" fill="none" stroke="#141312" strokeWidth="1" />
                    <path d="M15 50 Q 20 45 25 50" fill="none" stroke="#141312" strokeWidth="1" />
                </g>
                <circle cx="350" cy="55" r="28" fill="#e8ed2a" opacity="0.6" />
            </svg>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [dynamicStats, setDynamicStats] = useState({ q: 0, l: 0, r: 0, a: 0 });
            const [isSaving, setIsSaving] = useState(false);

            const radarCanvas = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores: { ...scores }, currentQ }]);
                setScores(newScores);

                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(currentQ + 1);
                    window.scrollTo(0, 0);
                } else {
                    const topTarget = Object.keys(newScores).reduce((a, b) => newScores[a] > newScores[b] ? a : b, "BORGES");
                    const res = ARCHETYPES[topTarget] || ARCHETYPES.BORGES;
                    const qP = Math.min(96, 40 + (newScores.WOOLF || 0)*12 + (newScores.LISPECTOR || 0)*8);
                    const lP = Math.min(96, 40 + (newScores.BORGES || 0)*15 + (newScores.CHRISTIE || 0)*10);
                    const rP = Math.min(96, 40 + (newScores.CAMUS || 0)*14 + (newScores.HEMINGWAY || 0)*12);
                    const awk = (88 + (qP + lP + rP) / 35).toFixed(1);
                    setDynamicStats({ q: qP, l: lP, r: rP, a: awk });
                    setResult(res);
                    setStep('result');
                }
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history.pop();
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory([...history]);
                } else { setStep('welcome'); }
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    const ctx = radarCanvas.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['理式', '感质', '意志', '灵气', '韧性'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(53, 175, 203, 0.12)',
                                borderColor: '#35afcb',
                                borderWidth: 1.5,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: { r: { grid: { color: 'rgba(0,0,0,0.04)' }, pointLabels: { font: { size: 8, weight: '600' } }, ticks: { display: false }, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen text-center">
                    {step === 'welcome' && (
                        <div className="animate-fade-in space-y-12 pt-10">
                            <div className="text-left">
                                <h1 className="text-4xl font-black tracking-tight text-[#000000] leading-tight text-center md:text-left">寻找你的<br /><span className="highlight-yellow">文学原型</span></h1>
                                <p className="text-[9px] font-bold text-gray-400 mt-4 uppercase tracking-[0.3em] text-center md:text-left">Arché Narrative Lab // 2026 Archive Project</p>
                            </div>
                            <div className="w-full max-w-[220px] mx-auto opacity-90 grayscale contrast-125"><BrainJar /></div>
                            <div className="space-y-12">
                                <div className="text-left border-l-4 border-[#e8ed2a] pl-5 space-y-4">
                                    <p className="text-base font-bold leading-relaxed text-[#3a3833]">基于 20 位文学宗师的精神切片，关于“生存站姿”的深度测算。</p>
                                    <p className="text-[11px] text-gray-500 font-medium text-left italic">“文学并非点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <button onClick={() => setStep('quiz')} className="w-full py-6 bg-[#141312] text-white text-xs tracking-[1.2em] font-bold active:scale-95 transition-all uppercase rounded-sm">激活档案库 / START</button>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-10">
                            <div className="flex justify-between items-center pb-5 border-b border-black/5">
                                <button onClick={handleBack} className="text-[9px] font-bold text-gray-300 hover:text-black uppercase tracking-widest px-2 py-1 bg-black/5 rounded transition-all">← BACK</button>
                                <span className="text-[9px] font-bold text-[#35afcb] uppercase font-mono tracking-tighter">Archive {String(currentQ + 1).padStart(2, '0')} / 30</span>
                                <div className="w-1/3 h-1 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-black transition-all" style={{ width: `${((currentQ + 1)/30)*100}%` }}></div></div>
                            </div>
                            <h2 className="text-lg md:text-xl font-semibold leading-[1.6] text-[#141312] tracking-tight pt-4 px-2 text-left">
                                {QUESTIONS[currentQ].text}
                            </h2>
                            <div className="space-y-3 pt-4">
                                {QUESTIONS[currentQ].options.map((option, idx) => (
                                    <div key={idx} onClick={() => handleAnswer(option.target)} className="option-card">
                                        <span className="text-[13px] md:text-sm font-light leading-relaxed text-[#2a2825]">{option.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-10 pb-20">
                            <div ref={captureRef} className="p-4 space-y-10 bg-[#f2f0e9]">
                                <div className="text-center space-y-3 pt-12 bg-white border border-[#dcd8cf] rounded-sm relative overflow-hidden pb-8">
                                    <span className="text-[7px] font-bold uppercase tracking-[0.5em] text-[#35afcb] block">Literature Archetype Profile</span>
                                    <h2 className="text-3xl font-bold text-[#3a3833] tracking-widest">{result.name}</h2>
                                    <p className="text-[8px] text-[#35afcb] italic tracking-[0.3em] font-medium uppercase">{result.sub}</p>
                                    <div className="flex justify-center gap-2 pt-3">
                                        <span className="px-2 py-0.5 border border-gray-300 text-[7px] font-bold text-center uppercase tracking-tighter">思辨觉醒度 {dynamicStats.a}%</span>
                                        <span className="px-2 py-0.5 bg-[#3a3833] text-white text-[7px] font-bold uppercase font-sans text-center">Validated</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-6 border border-[#dcd8cf] rounded-2xl shadow-sm relative text-left">
                                    <div className="tag-soul">NO. 2026-SOUL</div>
                                    <div className="space-y-5">
                                        <h4 className="text-[8px] font-black border-b pb-1 italic tracking-widest text-gray-400 uppercase text-left">基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-5 text-left">
                                            {[["感质驱动", dynamicStats.q, "#e8ed2a"], ["理式逻辑", dynamicStats.l, "#35afcb"], ["反叛意志", dynamicStats.r, "#000000"]].map(([lbl, val, clr]) => (
                                                <div key={lbl} className="space-y-1">
                                                    <div className="flex justify-between text-[7px] font-bold uppercase tracking-tight text-gray-400 text-left"><span>{lbl}</span></div>
                                                    <div className="progress-bar-thin"><div className="progress-fill-thin" style={{width: `${val}%`, backgroundColor: clr}}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[130px] mx-auto text-center"><canvas ref={radarCanvas}></canvas></div>
                                </div>

                                <div className="relative p-8 bg-white border border-[#dcd8cf] text-center shadow-sm">
                                    <p className="text-sm md:text-base leading-relaxed mb-4 font-medium italic text-[#3a3833] text-center"><span className="highlight-yellow">“{result.quote}”</span></p>
                                    <div className="text-[8px] text-gray-400 tracking-widest uppercase font-bold text-center">— {result.name} —</div>
                                </div>

                                <div className="space-y-10 px-2 text-left">
                                    <section className="space-y-4 text-left">
                                        <h4 className="text-[9px] font-black uppercase tracking-[0.4em] border-b border-[#dcd8cf] pb-1 text-gray-400">精神解剖报告 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-[10px] border-[#35afcb] space-y-6 shadow-sm rounded-r-xl">
                                            <div>
                                                <span className="text-[7px] font-bold text-gray-300 uppercase block mb-1">文学原型界定 (IDENTITY)</span>
                                                <p className="text-xs leading-relaxed text-gray-500 font-bold italic text-left">{result.identity}</p>
                                            </div>
                                            <div>
                                                <span className="text-[7px] font-bold text-gray-300 uppercase block mb-1 uppercase font-sans text-left">写作风格重构 (WRITING)</span>
                                                <p className="text-[10px] leading-relaxed font-medium text-[#d14d42] bg-red-50/20 p-2 rounded-sm italic text-left">{result.writing}</p>
                                            </div>
                                            <div>
                                                <span className="text-[7px] font-bold text-gray-300 uppercase block mb-1 text-left text-left">深层精神症候 (SYMPTOM)</span>
                                                <p className="text-[10px] leading-relaxed text-gray-500 text-left">{result.symptom}</p>
                                            </div>
                                            <div>
                                                <span className="text-[7px] font-bold text-gray-300 uppercase block mb-1 text-left text-left">生存叙事建议 (COUNSEL)</span>
                                                <p className="text-xs leading-relaxed font-bold text-[#35afcb] text-left">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-4 text-left text-left">
                                        <h4 className="text-[9px] font-black uppercase tracking-[0.4em] border-b border-[#dcd8cf] pb-1 text-red-200 text-left">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <div className="p-5 bg-red-50/40 border border-red-100 rounded-sm">
                                                <span className="text-[8px] font-bold text-red-700 block mb-1 uppercase text-left">核心焦虑 (ANXIETY)</span>
                                                <p className="text-[10px] text-red-900 font-medium text-left">{result.anxiety || "暂时无法读取"}</p>
                                            </div>
                                            <div className="p-5 bg-gray-50/50 border border-gray-100 rounded-sm text-left">
                                                <span className="text-[8px] font-bold text-gray-400 block mb-1 uppercase text-left">潜在阴影 (SHADOW)</span>
                                                <p className="text-[10px] text-gray-600 text-left">{result.shadow || "未被观测"}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-5 text-left text-left">
                                        <h4 className="text-[9px] font-black uppercase tracking-[0.4em] border-b border-gray-200 pb-1 text-gray-300">思想进阶书单推荐 / READINGS</h4>
                                        <div className="grid gap-3">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="book-card shadow-sm hover:shadow-md transition-shadow">
                                                    <h5 className="text-xs font-bold mb-0.5 text-[#3a3833]">{book.title}</h5>
                                                    <p className="text-[8px] font-bold text-[#a4c29b] mb-1 uppercase">作者: {book.author}</p>
                                                    <p className="text-[9px] text-gray-500 italic leading-relaxed text-left">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <div className="pt-10 space-y-4 px-10">
                                <button onClick={() => {
                                    setIsSaving(true);
                                    html2canvas(captureRef.current, { scale: 2, useCORS: true }).then(canvas => {
                                        const link = document.createElement('a');
                                        link.download = `文学报告-${result.name}.png`;
                                        link.href = canvas.toDataURL(); link.click();
                                        setIsSaving(false);
                                    });
                                }} className="w-full py-6 bg-[#141312] text-white text-xs font-black uppercase tracking-[1.2em] shadow-2xl rounded-sm transition-all active:scale-95 text-center"> {isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({}); setCurrentQ(0); }} className="w-full py-6 border-2 border-[#141312] text-xs font-black uppercase tracking-[1.2em] active:scale-95 transition-all text-center rounded-sm text-center">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40 text-center">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold text-center">A Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2 text-center text-center text-center">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
