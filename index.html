            ATWOOD: { name: "阿特伍德", sub: "末世寓言观察家", identity: "在生存边缘预演文明的坍塌，守护女性主体性的叙事主权。你是清醒的哨兵。", writing: "手术刀笔触。笔触冷峻锋利，在解剖社会结构的同时保留最深的人性叩问。", symptom: "预言家焦虑。你总是在最繁荣的时刻嗅到腐朽。清醒是你要付出的最高昂代价。", counsel: "不要让恐惧成为主人。你的眼光应当像冰块一样冷。", stats: [85, 90, 70, 80, 85], quote: "眼光必须清醒。", books: [{title: "《使女的故事》", author: "阿特伍德", desc: "当权利被格式化。"}, {title: "《盲刺客》", author: "阿特伍德", desc: "层层包裹的虚构谜团。"}, {title: "《别名格蕾丝》", author: "阿特伍德", desc: "对记忆、罪行与真相的重构。"}] },
            JOYCE: { name: "乔伊斯", sub: "语言迷宫开拓者", identity: "用复杂的符号重构感官，视‘错误’为发现真理的门径。你用语言建造了一个帝国。", writing: "全感官互文。文字不仅仅是看，更是听、嗅、触摸。捕捉未经修饰的瞬时念头。", symptom: "史诗化强迫。试图赋予平庸瞬间以古典神圣感。在文字里进行永无止境的奥德赛。", counsel: "如果你能在一粒沙中发现都柏林，你就掌握了不朽。", stats: [50, 98, 92, 60, 75], quote: "错误是发现的门径。", books: [{title: "《尤利西斯》", author: "乔伊斯", desc: "重演文明的现代史诗。"}, {title: "《都柏林人》", author: "乔伊斯", desc: "剖析平庸背后的灵魂瘫痪。"}, {title: "《青年艺术家的画像》", author: "乔伊斯", desc: "个体如何在传统阴影中发明自我。"}] },
            SAGAN: { name: "萨冈", sub: "忧愁叛逆的缪斯", identity: "用慵懒姿态抗拒成人的沉重，视‘忧愁’为高级的配件。你用轻盈反抗那个臃肿的世界。", writing: "漫不经心的优雅。练习‘减法’写作，重心放在情绪流转。在速度中寻求瞬间完整。", symptom: "某种微笑。习惯用轻佻的优雅对抗深沉。拒绝宏大叙事。", counsel: "轻盈也是一种力量。拒绝深沉是对这个世界最优雅的嘲讽。", stats: [88, 55, 85, 90, 60], quote: "所有这些温柔忧伤的时刻。", books: [{title: "《你好，忧愁》", author: "萨冈", desc: "青春的任性与不确定的爱。"}, {title: "《某种微笑》", author: "萨冈", desc: "早熟的残酷与幻灭感。"}, {title: "《一月后，一年后》", author: "萨冈", desc: "都市男女伤感流转。"}] },
            PROUST: { name: "普鲁斯特", sub: "时间的拾荒者", identity: "通过感官共振召唤失落的过去，将消失的时间固化为永恒。你是记忆的炼金术士。", writing: "显微镜叙事。通过特定的感官线索（如气味），让叙事在时间中跳跃。", symptom: "玛德琳症候。气味能开启整个宇宙。你认为艺术化叙述过的生活才有意义。", counsel: "时间带不走一切，只要你能将其文学化。你的记忆就是你的行宫。", stats: [30, 95, 95, 55, 60], quote: "真正的发现之旅，在于拥有新眼光。", books: [{title: "《追寻逝去的时光》", author: "普鲁斯特", desc: "对精神原点最深情的溯源。"}, {title: "《斯万家那边》", author: "普鲁斯特", desc: "感官瞬间召唤出的庞大童年宇宙。"}, {title: "《在少女花影下》", author: "普鲁斯特", desc: "在细腻记忆里寻找永恒。"}] },
            DICKINSON: { name: "狄金森", sub: "内心宇宙隐秘女皇", identity: "在极小空间构建无限精神，视‘孤独’为极高资源。你的卧室就是全宇宙。", writing: "极致凝练。删除冗余。将复杂的形而上学思考压缩进极短的破折号中。", symptom: "孤绝主权。你认为‘缺席’才是最高级的存在。破折号是通向宇宙的隧道。", counsel: "外界并不重要。只要你愿意，你就是你内心王国的女皇。", stats: [30, 92, 90, 35, 65], quote: "假如我不曾见过太阳，我本可以忍受黑暗。", books: [{title: "《狄金森诗选》", author: "狄金森", desc: "通向灵魂最深处的凝练文字。"}, {title: "《孤独是迷人的》", author: "狄金森", desc: "在方寸之间俯瞰生死。"}, {title: "《致世界的一封信》", author: "狄金森", desc: "隐秘灵魂最智性的馈赠。"}] },
            BEAUVOIR: { name: "波伏娃", sub: "主体性的先行者", identity: "拒绝预设的角色，主张存在先于本质。你认为自由即责任。你是永不疲倦的选择者。", writing: "辩论色彩叙事。剥离装饰性感性，让博弈在逻辑中显影。", symptom: "存在主义焦虑。坚持在‘选择’中发明自我。文学是你声明存在的旗帜。", counsel: "绝不让生命受任何人的支配。这种孤绝是你最强的铠甲。", stats: [90, 88, 50, 80, 75], quote: "我绝不让我的生命受任何人的支配。", books: [{title: "《第二性》", author: "波伏娃", desc: "彻底拆解‘被制造’的身份。"}, {title: "《名士风流》", author: "波伏娃", desc: "探讨知识分子的责任与自由。"}, {title: "《被误解的女人》", author: "波伏娃", desc: "关于如何夺回叙事主权。"}] },
            PLATH: { name: "普拉斯", sub: "真实底色追光者", identity: "赤裸面对灵魂风暴，宁愿灼烧也不接受伪善。你追求极致的真诚。你的意象带刺。", writing: "痛感自白。不要逃避内心的黑暗。用生理性的准确描写那些窒息或狂喜时刻。", symptom: "钟形罩效应。感到一种透明但沉重的隔绝感。通过展示伤口来控诉。", counsel: "真诚是有毒的，但它是你唯一的药。不要熄灭内心的火焰。", stats: [95, 55, 80, 45, 92], quote: "我从灰烬中升起，我以人类为食。", books: [{title: "《钟形罩》", author: "普拉斯", desc: "在窒息中寻找自我的杰作。"}, {title: "《爱丽儿》", author: "普拉斯", desc: "灵魂在自毁边缘发出的咆哮。"}, {title: "《巨像》", author: "普拉斯", desc: "对父权阴影的深沉解构。"}] },
            CHRISTIE: { name: "阿加莎", sub: "秩序修复者", identity: "你在非理性的破坏中寻找逻辑终点。你是混乱地带的定盘星，相信真相能让人归位。", writing: "精密逻辑拼图。先预设‘终局’，再反向推演。每句话都应是齿轮。", symptom: "闭环偏好。必须通过理性的光亮，把恶意彻底显影。你视人性为精密机器。", counsel: "秩序的重建是对苦难最大的慈悲。在混乱中，你就是最后的地基。", stats: [35, 98, 40, 75, 80], quote: "事实总是能说明一切。", books: [{title: "《无人生还》", author: "阿加莎", desc: "关于罪与罚的终极智力博弈。"}, {title: "《罗杰疑案》", author: "阿加莎", desc: "一场彻底颠覆叙述者主体的解谜。"}, {title: "《东方快车谋杀案》", author: "阿加莎", desc: "当法律失效，逻辑如何定义正义。"}] }
        };

        const QUESTIONS = [
            { id: 1, text: "如果你发现自己正身处一个永远无法抵达终点的长廊，你会：", options: [
                { text: "停下来，详细测量每一块地砖的间距，试图从结构中找到漏洞", target: "BORGES" },
                { text: "感到极度的恐慌，认为是某种庞大的官僚系统对我进行了‘报错’处理", target: "KAFKA" },
                { text: "继续走下去。既然没有终点，那行走本身就是我唯一的主权和幸福", target: "CAMUS" },
                { text: "闭上眼，感受长廊里空气流动的细微冷暖，将它内化为一种私人节律", target: "WOOLF" }
            ] },
            { id: 2, text: "面对一个长满荆棘的“真相”，你本能的反应倾向于是：", options: [
                { text: "不管多痛，我都要伸手去抓。我想确认那种血肉模糊的真实生理感", target: "LISPECTOR" },
                { text: "在安全距离外观测。分析荆棘生长的因果规律，将其编写为符号系统", target: "BORGES" },
                { text: "穿上我最体面的盔甲去修剪它。秩序的重建才是个体唯一的尊严", target: "HEMINGWAY" },
                { text: "在荆棘旁坐下。在那阵荒凉的美感中，等待这一抹夕阳逐渐沉没", target: "EILEEN_CHANG" }
            ] },
            { id: 3, text: "关于“自由”，你的直觉更倾向于认同：", options: [
                { text: "一把沉重且冰冷的双刃剑。在握住它的瞬间，我也认领了对自己绝对的责任", target: "BEAUVOIR" },
                { text: "一个永远无法抵达的幻觉。但我愿意为了这份幻觉，推一辈子无用的巨石", target: "CAMUS" },
                { text: "一种令人窒息的真空感。没有了枷锁，我反而迷失在‘我是谁’的荒原里", target: "KAFKA" },
                { text: "一匹脱缰的烈马。在那阵飞驰的眩晕里，我才感到主体性的瞬间完整", target: "SAGAN" }
            ] },
            { id: 4, text: "关于“面具”，或者我们在社交中表现出的那层体面，你的理解更接近：", options: [
                { text: "一个不得不穿上的异化外壳。它保护我也在蚕食我，令我感到生理性的恶心", target: "KAFKA" },
                { text: "一个博弈的符号。人生本就是一场互文，真实往往只能藏在虚构的面具之后", target: "BORGES" },
                { text: "一个体面的盔甲。它能掩盖我的脆弱与不堪，让我在精神废墟上维持风度", target: "EILEEN_CHANG" },
                { text: "一个流动的感觉。我通过不断变换的面具，在每一秒钟重新发明一个全新的自我", target: "WOOLF" }
            ] },
            { id: 5, text: "如果有人告诉你，你所在的城市其实是一个精密运行的巨大假象：", options: [
                { text: "立刻寻找控制中心。我想分析这套虚假逻辑背后的总调度算法", target: "BORGES" },
                { text: "点一根烟。既然是假象，那么我的这一口呼吸就是对虚无最高级的嘲讽", target: "CAMUS" },
                { text: "疯狂地寻找一个能刺破这假象的、带血的真相，哪怕代价是彻底的崩溃", target: "LISPECTOR" },
                { text: "躲进我的房间。只要我能守住我内心的那一小块褶皱，全世界的假象都与我无关", target: "DICKINSON" }
            ] },
            { id: 6, text: "在废墟中，你发现了一本写满你未来的“命运之书”，你会：", options: [
                { text: "直接烧掉。我绝不接受任何形式的预设，即便结局已经注定", target: "CAMUS" },
                { text: "仔细阅读并做批注。我想在已定的命运里，开辟出属于我的逻辑复调", target: "BORGES" },
                { text: "体面地合上它。既然结局已知，那就从容地演完这场注定要输的战役", target: "HEMINGWAY" },
                { text: "感到深深的幻灭。那种被窥视、被格式化的命运感让我想要立刻消失", target: "KAFKA" }
            ] },
            { id: 7, text: "关于“真相”，你更愿意相信它是：", options: [
                { text: "一只被挤扁的甲虫。它极度丑陋且真实，是揭开文明假象后的生理底片", target: "LISPECTOR" },
                { text: "一组永恒且精密的编码。只要理智足够清醒，就能从纷繁中将其破解", target: "BORGES" },
                { text: "一袭华丽的袍子。掀开它，里面全都是爬满的虱子和肮脏的算计", target: "EILEEN_CHANG" },
                { text: "一个不需要被言说的动作。在沉默与呼吸之间，它表现得最为清晰", target: "HEMINGWAY" }
            ] },
            { id: 8, text: "如果你发现你最爱的人，其实只是你自己孤身一人产生的投射幻觉：", options: [
                { text: "继续爱。既然世界本就是荒谬的，那么幻觉就是我唯一的信仰和幸福", target: "CAMUS" },
                { text: "记录下幻觉出现的周期与细节。分析这种精神投射背后的自我博弈机制", target: "BORGES" },
                { text: "感到彻骨的苍凉。对着空气最后敬一杯冷掉的茶，完成这场自我的谢幕", target: "EILEEN_CHANG" },
                { text: "亲吻这种幻觉。在那阵虚无的触碰中，我也感到了真实的温存与战栗", target: "WOOLF" }
            ] },
            { id: 9, text: "面对一个只有两个选项的绝境，你打算如何完成抉择：", options: [
                { text: "依靠直觉。在那阵生理性的悸动中认领我的决定，无视所有的逻辑后果", target: "LISPECTOR" },
                { text: "依靠公式。在纷繁的因果链条中推导出概率最大、逻辑最严密的解", target: "BORGES" },
                { text: "依靠责任。即便我不认同这两个选项，我也会为了作为主体的道义而承担", target: "BEAUVOIR" },
                { text: "依靠嘲讽。既然生活本身已是死局，怎么选都不过是推石头游戏的另一种形式", target: "CAMUS" }
            ] },
            { id: 10, text: "当你发现你的秘密被公开悬挂在广场上，你打算：", options: [
                { text: "大笑。既然所有人都看见了丑陋，那么‘羞耻’就不再能绑架我的自由", target: "CAMUS" },
                { text: "分析。我想弄清楚是谁、通过什么逻辑漏洞窃取了我的精神隐私", target: "CHRISTIE" },
                { text: "消失。在那阵被众目睽睽审判的窒息感中，认领我作为异类的报错身份", target: "KAFKA" },
                { text: "守住风度。穿上最挺拔的西装走上广场，那是作为一个硬汉最后的体面", target: "HEMINGWAY" }
            ] },
            { id: 11, text: "如果你的一生被写在了一本旧书里，你会：", options: [
                { text: "在页边距上写满反驳和注释，构建出一套独立于原著的个人复音系统", target: "BORGES" },
                { text: "闭上眼去摸纸张的颗粒感。我只在意这种实存的生理触感和这一秒的呼吸", target: "LISPECTOR" },
                { text: "翻到最后看结局，然后嘲笑这种被他者预设好的平庸命运", target: "CAMUS" },
                { text: "体面地合上它。即便已经知道了剧情，我也要演好剩下的每一个动作", target: "HEMINGWAY" }
            ] },
            { id: 12, text: "你被带到一个没有出口的“纯白房间”，你打算：", options: [
                { text: "在墙上画满窗户。用想象力去发明一个不属于这个系统的自由国度", target: "WOOLF" },
                { text: "等待。直到在这种极度的空白与寂静中，听到自我的心脏发出的报错声", target: "KAFKA" },
                { text: "研究光线的折射角度。通过数学手段推导这个空间在逻辑维度的位置", target: "BORGES" },
                { text: "什么也不做。既然没有出口是必然，我就在这空白里完成我最后的谢幕", target: "HEMINGWAY" }
            ] },
            { id: 13, text: "历史终结前只能剩下一个词。你会为自己留下哪一个？", options: [
                { text: "“但是” —— 永远保持怀疑、怀疑和翻转所有确定性的可能", target: "KAFKA" },
                { text: "“因为” —— 守住人类对抗无序时，那最后一道逻辑与因果的底线", target: "BORGES" },
                { text: "“也许” —— 为冰冷且机械的世界，保留最后一点朦胧的审美余地", target: "WOOLF" },
                { text: "“再会” —— 开启另一场未知的超越之旅。既然此生荒诞，何不再次出发", target: "CAMUS" }
            ] },
            { id: 14, text: "如果你的一生浓缩成一件文学圣器。它会是：", options: [
                { text: "一把剖开伪善与格式化外壳的、沾着血迹的利刃", target: "KAFKA" },
                { text: "一架可以观测到星体运行最微小因果逻辑的望远镜", target: "BORGES" },
                { text: "一瓶装满了晚霞残影的、正在微微颤动的蓝色墨水", target: "WOOLF" },
                { text: "一张永远折叠不完的、通向荒野的灵魂地图", target: "CAMUS" }
            ] },
            { id: 15, text: "面对命运中那股压抑的、不给解释的沉默，你会：", options: [
                { text: "拔出长剑。向那片虚无发起一场必败、但尊严十足的挑战", target: "HEMINGWAY" },
                { text: "狂笑反弹。神不就是人类极其苍白的逻辑在宇宙中的巨大投射吗？", target: "KAFKA" },
                { text: "走向更深处的沙漠。在那里，连宿命和规则也管不到我的主权", target: "CAMUS" },
                { text: "闭上眼。用感知的灵光去在那片黑暗里发明一个神圣瞬间", target: "WOOLF" }
            ] },
            { id: 16, text: "如果你可以获得极致才华，代价是交出灵魂最纯粹的一半：", options: [
                { text: "成交！生命应该在瞬间的爆炸中，被确认为一团耀眼的火焰", target: "LISPECTOR" },
                { text: "拔剑。我拒绝这种非逻辑的交易。尊严必须通过个体的意志赢来", target: "HEMINGWAY" },
                { text: "拒绝。我的灵魂早已挥洒在寻找真理的路上，对方来得太晚了", target: "CAMUS" },
                { text: "签约。然后分析契约漏洞。我打算在法律逻辑层面反手杀掉诱惑者", target: "BORGES" }
            ] },
            { id: 17, text: "深夜你发现书架上的书正在互相吵架，你会：", options: [
                { text: "站在一旁冷静地记录。这才是思想最真实的、充满血腥的互文博弈", target: "BORGES" },
                { text: "感到极其焦虑。这种秩序的崩坏是对我作为一个分类者的巨大审判", target: "KAFKA" },
                { text: "直接关灯。让这些无聊的智力争吵在黑暗里自生自灭吧", target: "CAMUS" },
                { text: "加入它们。用一种梦呓般的语调跟它们分享我此时此刻感官的震颤", target: "WOOLF" }
            ] },
            { id: 18, text: "当你在极度的寂静中，开始能听见尘埃落地的声音，你会：", options: [

                    <footer className="mt-16 py-10 text-center opacity-40">
