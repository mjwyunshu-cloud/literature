                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1">文学原型界定</span>
                                                <p className="text-base leading-relaxed text-gray-500 font-bold italic text-left">“{result.identity}”</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 uppercase font-sans text-left">写作偏好建议 (WRITING STYLE)</span>
                                                <p className="text-sm leading-relaxed font-medium text-[#d14d42] bg-red-50/20 p-4 rounded-sm italic text-left">“{result.writing}”</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 text-left">精神症候解剖 (SYMPTOM)</span>
                                                <p className="text-sm leading-relaxed text-gray-500 text-left">{result.symptom}</p>
                                            </div>
                                            <div>
                                                <span className="text-[8px] font-bold text-gray-300 uppercase block mb-1 text-left">叙事建议 (COUNSEL)</span>
                                                <p className="text-lg leading-relaxed font-bold text-[#35afcb] text-left">{result.counsel}</p>
                                            </div>
                                        </div>
                                    </section>

                                    {/* 阴影与盲区 */}
                                    <section className="space-y-4">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.4em] border-b border-[#dcd8cf] pb-2 text-red-200 text-left">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left text-left">
                                            <div className="p-6 bg-red-50/40 border border-red-100 rounded-sm">
                                                <span className="text-[9px] font-bold text-red-700 block mb-2 uppercase">主导焦虑</span>
                                                <p className="text-sm text-red-900 font-medium">{result.anxiety || "暂时无法读取"}</p>
                                            </div>
                                            <div className="p-6 bg-gray-50/50 border border-gray-100 rounded-sm">
                                                <span className="text-[9px] font-bold text-gray-400 block mb-2 uppercase">阴影面</span>
                                                <p className="text-sm text-gray-600">{result.shadow || "未被观测"}</p>
                                            </div>
                                        </div>
                                    </section>

                                    {/* 思想进阶书单推荐 - 每人 3 本 */}
                                    <section className="space-y-6">
                                        <h4 className="text-[10px] font-black uppercase tracking-[0.4em] border-b border-gray-200 pb-2 text-gray-300 text-left text-left">思想进阶书单推荐 / READINGS</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map((book, i) => (
                                                <div key={i} className="book-card shadow-sm hover:shadow-md transition-shadow text-left">
                                                    <h5 className="text-lg font-black mb-1 text-[#3a3833]">{book.title}</h5>
                                                    <p className="text-[10px] font-bold text-[#a4c29b] mb-3 uppercase">作者: {book.author}</p>
                                                    <p className="text-xs text-gray-500 italic leading-relaxed text-left">{book.desc}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <div className="pt-10 space-y-4 px-10 text-center">
                                <button onClick={() => {
                                    setIsSaving(true);
                                    html2canvas(captureRef.current, { scale: 2, useCORS: true }).then(canvas => {
                                        const link = document.createElement('a');
                                        link.download = `文学报告-${result.name}.png`;
                                        link.href = canvas.toDataURL(); link.click();
                                        setIsSaving(false);
                                    });
                                }} className="w-full py-8 bg-[#141312] text-white text-xs font-black uppercase tracking-[1.5em] shadow-2xl rounded-sm transition-all active:scale-95 text-center">{isSaving ? "GENERATING..." : "保存灵魂手稿 / SAVE REPORT"}</button>
                                <button onClick={() => { setStep('welcome'); setScores({}); setCurrentQ(0); }} className="w-full py-8 border-2 border-[#141312] text-xs font-black uppercase tracking-[1.5em] active:scale-95 transition-all text-center rounded-sm text-center">重新审视 / RESTART</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 py-10 text-center opacity-40 text-center">
                        <div className="text-[8px] uppercase tracking-widest mb-1 font-bold text-center text-center">A Digital Narrative Lab</div>
                        <div className="text-xs font-bold border-b border-black inline-block px-2 text-center text-center">Arché 思想铺子</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
