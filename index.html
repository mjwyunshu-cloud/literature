            { id: 11, text: "普鲁斯特的一块蛋糕勾起了你所有的记忆。你会：", source: "出自 马塞尔·普鲁斯特《追寻逝去的时光》", options: [{ text: "闭上眼，在那个过去的午后里待一辈子，再也不出来了", type: "IDEALIST" }, { text: "看看记忆是怎么被大脑重新加工包装的，这事儿真奇妙", type: "SAGE" }, { text: "觉得沉重，过去就像个牢笼，我得赶紧走开，去别的地方", type: "WANDERER" }, { text: "把这些记忆当成反抗现在的子弹，狠狠地射向枯燥的生活", type: "REBEL" }] },

            { id: 14, text: "萨冈驾跑车在南法公路上疯跑。风速极快时：", source: "出自 弗朗索瓦丝·萨冈《你好，忧愁》", options: [{ text: "速度就是唯一的药，这种破坏掉现实的感觉真好", type: "REBEL" }, { text: "风声就是我在异乡的呼吸声，这时候我觉得我是完整的", type: "WANDERER" }, { text: "感受风压和肾上腺素的平衡，看看这种疯狂背后能换来什么", type: "SAGE" }, { text: "夕阳美得让人想哭，这种忧愁才是我最贵重的勋章", type: "IDEALIST" }] },
            { id: 15, text: "兰波在《地狱一季》入口要你用“一半灵魂”换灵感：", source: "出自 阿蒂尔·兰波《地狱一季》", options: [{ text: "换！只要那一瞬间最灿烂的火光，之后就算死掉也值了", type: "IDEALIST" }, { text: "拔剑：这是对生命尊严的羞辱，我一定要打赢这一场", type: "HERO" }, { text: "告诉那个恶魔，我的灵魂早已挥洒在路上了，他来晚了", type: "WANDERER" }, { text: "成交，然后仔细盯着契约的漏洞，看看能不能把它反杀了", type: "SAGE" }] },
            { id: 16, text: "乔伊斯的都柏林正在举行葬礼。你走在街上：", source: "出自 詹姆斯·乔伊斯《都柏林人》", options: [{ text: "这一幕里藏着很多不朽的符号，细节才是通向真理的钥匙", type: "SAGE" }, { text: "必须打破这种瘫痪、死气沉沉的社会循环，哪怕用暴力", type: "REBEL" }, { text: "死不就是去远方出趟差吗？这些形式化的仪式感真累人", type: "WANDERER" }, { text: "死者的脸在夕阳下真宁静，这是感官上唯一的救赎了", type: "IDEALIST" }] },
            { id: 17, text: "历史快完蛋了，只能剩下一个词。你留下的词是：", source: "基于 让-弗朗索瓦·利奥塔 叙事学理论", options: [{ text: "“但是”：只要有这个词在，就永远有反抗和转折的可能", type: "REBEL" }, { text: "“因为”：哪怕世界毁灭，我也要守住因果逻辑的底线", type: "SAGE" }, { text: "“也许”：给这个冷冰冰、死确定的世界留一点模糊的余地", type: "IDEALIST" }, { text: "“再会”：预示着在下一个不可知的地平线，我们还会再见", type: "WANDERER" }] },
            { id: 18, text: "如果文字真的有气味，你希望读完你的书后，空气中弥漫着：", source: "基于 文学感官联觉理论", options: [{ text: "福尔马林的味道：冷静、干净、带有一种解剖的智性", type: "SAGE" }, { text: "火药和焦土的味道：破坏掉旧秩序后留下的、烫手的余温", type: "REBEL" }, { text: "旧报纸和干丁香的味道：怀旧、敏感且有点脆弱的诗意", type: "IDEALIST" }, { text: "咸咸的海风味：野性、广阔，带着一股孤独的自由冲力", type: "WANDERER" }] },
            { id: 19, text: "莫里森在《宠儿》中书写创伤。面对历史，你会：", source: "出自 托尼·莫里森《宠儿》", options: [{ text: "在博弈中找回那个被丢掉的名字，以此博回个体的尊严", type: "HERO" }, { text: "远方的自由比历史更有意义，我选择背负着伤痕继续走下去", type: "WANDERER" }, { text: "把痛苦拆解成社会学的符号，看看权力是怎么玩弄个体的", type: "SAGE" }, { text: "痛痛快快哭一场，然后把血迹写成诗，让残酷变美", type: "IDEALIST" }] },
            { id: 20, text: "文明即将坍缩。你站在边缘，心里想的是：", source: "出自 玛格丽特·阿特伍德《使女的故事》", options: [{ text: "记住这套系统是怎么崩坏的，别让后来人再掉进同样的坑", type: "SAGE" }, { text: "大笑这荒唐的剧终于谢幕了，这片废墟看着真有一种野性美", type: "REBEL" }, { text: "找片荒野隐居起来，没人认识我的时候才是我最自由的瞬间", type: "WANDERER" }, { text: "整理一下衣服和风度，体体面面地向结局敬一杯酒", type: "HERO" }] },
            { id: 21, text: "文学里的“风景”你最想要什么样的？", source: "基于 文本空间原型理论", options: [{ text: "荆棘满地的角斗场，我生来就喜欢这种高压力的对抗感", type: "HERO" }, { text: "几何形状的森林，每一棵树影后面都藏着指向真理的线索", type: "SAGE" }, { text: "江南那种连绵的烟雨，是我躲避异化现实唯一的防空洞", type: "IDEALIST" }, { text: "不停翻滚的大海，它每一刻都在喊我去远方流浪", type: "WANDERER" }] },
            { id: 22, text: "一段对话突然中断，你与对面的人陷入了长达三页纸的沉默。在这个窒息的留白里，你觉得：", source: "基于 叙事学沉默逻辑研究", options: [{ text: "这是最诚实的时刻：言语都是伪装，只有沉默能暴露因果", type: "SAGE" }, { text: "这是尊严的防线：有些话一旦说出口就轻浮了，沉默是孤岛", type: "HERO" }, { text: "这是最决绝的反抗：我拒绝使用你们的词汇，这死寂是审判", type: "REBEL" }, { text: "这是灵魂的震颤：光线的流转变得无比清晰，沉默即神性", type: "IDEALIST" }] },
            { id: 23, text: "你在页边距里发现了一个“微型国家”。你认为：", source: "基于 文本发生的偶然性理论", options: [{ text: "这是叙事之外的非法寄生，应当被正文的逻辑彻底清除掉", type: "REBEL" }, { text: "这是主体性的一块自留地，是我抗衡外部大世界的堡垒", type: "HERO" }, { text: "这是语言系统的一种偶然溢出，证明了文本逻辑的不稳定性", type: "SAGE" }, { text: "这是我一直寻找的乌托邦，在这里我终于不再是一个人", type: "IDEALIST" }] },
            { id: 24, text: "“神秘主义”在你看来意味着什么？", source: "基于 神秘主义认识论", options: [{ text: "审美的温床，一旦解释清楚了，这种朦胧的美也就凋谢了", type: "IDEALIST" }, { text: "理性的边疆，总有一天我会通过不断的实验算出它的公式", type: "SAGE" }, { text: "真理的掩体，我们要用不断的怀疑和反叛把真相逼出来", type: "REBEL" }, { text: "远方的地平线，它诱惑着我走向更遥远、更未知的地带", type: "WANDERER" }] },
            { id: 25, text: "当你的对手是你亲手写的角色时，你希望：", source: "基于 元叙事博弈论", options: [{ text: "他比我还横、还坚定，甚至能跳出纸面来反过来审判我", type: "REBEL" }, { text: "他是我智性的镜像，在逻辑的巅峰跟我来一场对弈", type: "SAGE" }, { text: "他是我理想人格的化身，替我在充满尘埃的世界里救赎", type: "IDEALIST" }, { text: "他在死的时候能展现出尊严，即便最后我会赢了他", type: "HERO" }] },
            { id: 26, text: "海明威式的“流动的盛宴”散后。你走在深夜的街头：", source: "出自 欧内斯特·海明威《流动的盛宴》", options: [{ text: "直接出城，下个地方肯定有更好的酒、更有意思的人", type: "WANDERER" }, { text: "在路灯下站得笔直，这是作为一个人的、最后的风度", type: "HERO" }, { text: "把这一晚所有的心理切片都记下来，以后肯定大有用处", type: "SAGE" }, { text: "在长椅上写首绝笔诗，把这种陨落的痛苦转化为美", type: "IDEALIST" }] },
            { id: 27, text: "面对神灵震耳欲聋的沉默，主角的回答是：", source: "基于 存在主义神性荒原论", options: [{ text: "拔出那柄生锈的剑，向那片虚无发起一场尊严挑战", type: "HERO" }, { text: "笑死，神不就是人类逻辑极其苍白的投射吗？", type: "REBEL" }, { text: "转身走入一望无际的沙漠，在那儿连神灵也管不到我", type: "WANDERER" }, { text: "闭上眼，给自己编个神圣瞬间，用幻觉去填补神的空位", type: "IDEALIST" }] },
            { id: 28, text: "如果文字最终非要变成一种形状，你希望是：", source: "基于 文本形态学理论", options: [{ text: "一把烧得通红的火，点燃了别人同时也毁掉了自己", type: "REBEL" }, { text: "一个完美的圆圈，首尾相接、因果环合，逻辑自闭", type: "SAGE" }, { text: "一条一直延伸到天边外的直线，永远指向未知的下一站", type: "WANDERER" }, { text: "一片随风飘着的羽毛，捕捉风的颤动，飘到哪儿算哪儿", type: "IDEALIST" }] },
            { id: 29, text: "如果你受命为人类历史写一段注脚。你选择：", source: "基于 历史哲学注脚", options: [{ text: "拆解那些辉煌词藻下的权力本质：揭穿那个最大的谎言", type: "REBEL" }, { text: "总结文明演变的公理：让规律在冰冷的文字中获得不朽", type: "SAGE" }, { text: "为每一个被遗忘的个体写一首葬歌：守护最后的温柔", type: "IDEALIST" }, { text: "告诉后人：除了所谓的历史，旷野上其实始终有风", type: "WANDERER" }] },
            { id: 30, text: "最后，如果你一生的灵魂最后成了一件圣器：", source: "基于 灵魂圣器与文学转录逻辑", options: [{ text: "一把剖开一切伪善与假面的利刃", type: "REBEL" }, { text: "一架能看清所有星星轨迹的望远镜", type: "SAGE" }, { text: "一个装下整片晚霞的墨水瓶", type: "IDEALIST" }, { text: "一张永远折叠不完的灵魂地图", type: "WANDERER" }] }
        ];

        function App() {
            var state = useState('welcome');
            var step = state[0]; var setStep = state[1];
            var qState = useState(0);
            var currentQuestion = qState[0]; var setCurrentQuestion = qState[1];
            var sState = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            var scores = sState[0]; var setScores = sState[1];
            var hState = useState([]);
            var history = hState[0]; var setHistory = hState[1];
            var rState = useState(null);
            var result = rState[0]; var setResult = rState[1];
            var cState = useState("");
            var code = cState[0]; var setCode = cState[1];
            var eState = useState(false);
            var showError = eState[0]; var setShowError = eState[1];
            var isSavingState = useState(false);
            var isSaving = isSavingState[0]; var setIsSaving = isSavingState[1];

            var radarCanvas = useRef(null);
            var captureRef = useRef(null);
            var chartRef = useRef(null);

            var handleVerify = function() { 
                if (code.toLowerCase().trim() === "cloud") setStep('quiz'); 
                else { setShowError(true); setTimeout(function(){ setShowError(false) }, 500); } 
            };
            
            var handleAnswer = function(type) {
                var newScores = Object.assign({}, scores);
                newScores[type] = (newScores[type] || 0) + 1;
                setHistory(history.concat([{ scores: scores, currentQuestion: currentQuestion }]));
                setScores(newScores);
                if (currentQuestion < 29) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    var topArchetype = Object.keys(newScores).reduce(function(a, b){ return newScores[a] > newScores[b] ? a : b });
                    var MAP = {
                        REBEL: ["KAFKA", "CAMUS", "PLATH", "SAGAN"],
                        SAGE: ["BORGES", "JOYCE", "LISPECTOR", "CHRISTIE"],
                        IDEALIST: ["WOOLF", "DICKINSON", "WILDE", "PROUST"],
                        WANDERER: ["HESSE", "MURAKAMI", "MORRISON", "ATWOOD"],
                        HERO: ["HEMINGWAY", "MARQUEZ", "DURAS", "EILEEN_CHANG"]
                    };
                    var pool = MAP[topArchetype] || ["KAFKA"];
                    var key = pool[Math.floor(Math.random() * pool.length)];
                    setResult(ARCHETYPES[key]);
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            var handleBack = function() { 
                if (history.length > 0) { 
                    var last = history[history.length - 1];
                    setScores(last.scores); setCurrentQuestion(last.currentQuestion); setHistory(history.slice(0, -1)); 
                } else setStep('welcome'); 
            };

            var handleRestart = function() { 
                if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
                setStep('welcome'); setCurrentQuestion(0); setScores({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 }); setHistory([]); setResult(null); setCode(""); setShowError(false); window.scrollTo(0, 0); 
            };

            useEffect(function() {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    var ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['反叛', '智性', '审美', '自由', '意志'],
                            datasets: [{ data: result.stats, backgroundColor: 'rgba(53, 175, 203, 0.1)', borderColor: COLORS.accentBlue, borderWidth: 1.5, pointRadius: 0 }]
                        },
                        options: { scales: { r: { angleLines: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            var saveAsImage = function() {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                html2canvas(captureRef.current, { scale: 2, backgroundColor: COLORS.bg, useCORS: true })
                    .then(function(canvas) {
                        var link = document.createElement('a');
                        link.download = '文学原型报告-' + result.name + '.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        setIsSaving(false);
                    })
                    .catch(function(err) { 
                        console.error(err); 
                        setIsSaving(false); 
                    });
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-8 min-h-screen">
                    {step === 'welcome' && (
                        <div className="animate-fade-in text-center space-y-12">
                            <div className="text-left pt-6">
                                <div className="inline-block px-3 py-1 bg-[#35afcb] text-white text-[9px] tracking-widest font-sans mb-4 transform -rotate-2">Psychographic Assessment</div>
                                <h1 className="text-4xl md:text-5xl font-light leading-tight tracking-widest text-[#3a3833]">寻找你的<br /><span className="font-bold border-b-4 border-[#e8ed2a]">文学原型</span></h1>
                            </div>
                            <div className="w-full max-w-[340px] mx-auto aspect-[4/3.5] relative opacity-80">
                                <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-sm">
                                    <path d="M150 100 L250 100 L265 135 Q 310 160 310 250 Q 310 310 200 310 Q 90 310 90 250 Q 90 160 135 135 Z" fill="none" stroke={COLORS.textMain} strokeWidth="1.5" />
                                    <path d="M160 110 L240 110" stroke={COLORS.textMain} strokeWidth="1" />
                                    <g transform="translate(180, 210)">
                                        <circle cx="20" cy="20" r="8" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                                        <path d="M20 28 Q 20 55 10 75 M20 28 Q 20 55 30 75" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" />
                                    </g>
                                    <circle cx="330" cy="110" r="4" fill={COLORS.textMain} />
                                    <circle cx="350" cy="55" r="28" fill={COLORS.accentYellow} opacity="0.35" />
                                </svg>
                            </div>
                            <div className="space-y-10">
                                <div className="space-y-4 px-4 text-left border-l-2 border-[#e8ed2a] pl-4">
                                    <p className="text-[13px] text-[#3a3833] leading-relaxed font-bold tracking-widest">这是一场基于 20 位世界大师笔下经典叙事场景展开的精神漫游。</p>
                                    <p className="text-xs text-[#6d6b64] leading-relaxed tracking-wider font-light italic">“文学不是修辞的点缀，而是你在精神废墟上，重建主体性的最后一次存证。”</p>
                                </div>
                                <div className={"space-y-4 " + (showError ? 'shake' : '')}>
                                    <div className="flex flex-col items-center gap-2">
                                        <span className="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold font-sans">通行码认证 / ACCESS CODE</span>
                                        <input type="text" value={code} onChange={function(e){ setCode(e.target.value) }} className="redeem-input w-48 py-2 text-sm text-center" placeholder="请输入通行码" />
                                    </div>
                                </div>
                                <button onClick={handleVerify} className="w-full py-6 bg-[#3a3833] text-white text-[11px] tracking-[0.8em] font-bold active:scale-95 transition-all shadow-lg">开启漫游 / LAUNCH</button>
                                <div className="text-[10px] text-gray-400 tracking-[0.3em] font-sans">Curated by @云树cloudtree</div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="animate-fade-in space-y-8 text-center">
                            <div className="flex justify-between items-center border-b border-[#dcd8cf] pb-4">
                                <button onClick={handleBack} className="flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-sans">BACK</button>
                                <span className="text-[9px] uppercase text-[#6d6b64] font-bold tracking-widest">Step {String(currentQuestion + 1).padStart(2, '0')} / 30</span>
                                <div className="w-10"></div>
                            </div>
                            <div className="min-h-[160px] flex flex-col items-center justify-center px-4 border-l border-r border-[#dcd8cf]">
                                <h2 className="text-lg md:text-xl font-normal leading-relaxed text-[#3a3833] italic mb-2">{QUESTIONS[currentQuestion].text}</h2>
                                <p className="text-[10px] text-[#6d6b64] opacity-40 font-sans italic tracking-widest">— {QUESTIONS[currentQuestion].source} —</p>
                            </div>
                            <div className="space-y-4 text-left">
                                {QUESTIONS[currentQuestion].options.map(function(option, idx){
                                    return (
                                        <button key={idx} onClick={function(){ handleAnswer(option.type) }} className="option-btn w-full p-6 rounded-[12px] border border-[#dcd8cf] hover:border-[#3a3833] text-left group shadow-sm active:bg-white">
                                            <span className="text-[14px] text-[#6d6b64] group-hover:text-[#3a3833] leading-relaxed pr-4 font-medium">{option.text}</span>
                                        </button>
                                    );
                                })}
                            </div>
                            <div className="pt-10 flex justify-center"><div className="h-[1px] w-48 bg-[#dcd8cf] relative"><div className="h-full bg-[#3a3833] transition-all duration-700" style={{width: ((currentQuestion+1)/30*100) + '%'}}></div></div></div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="animate-fade-in space-y-8 pb-12">
                            <div ref={captureRef} className="p-4 space-y-12 bg-[#f2f0e9]">
                                <div className="text-center space-y-6 py-12 bg-white border border-[#dcd8cf] rounded-sm shadow-sm relative overflow-hidden">
                                    <span className="text-[10px] font-bold uppercase tracking-[0.5em] text-[#35afcb] font-sans">Literature Archetype Profile</span>
                                    <h2 className="text-5xl font-bold text-[#3a3833] tracking-widest px-2">{result.name}</h2>
                                    <p className="text-sm text-[#35afcb] italic tracking-[0.4em] font-sans">{result.sub}</p>
                                    <div className="flex justify-center gap-4 pt-4">
                                        <span className="px-3 py-1 border border-[#3a3833] text-[9px] font-bold uppercase font-sans">思辨觉醒度</span>
                                        <span className="px-3 py-1 bg-[#3a3833] text-white text-[9px] font-bold uppercase font-sans">主体性存证</span>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white p-8 border border-[#dcd8cf] relative">
                                    <div className="absolute -top-3 -right-3 px-3 py-1 bg-white border border-[#3a3833] text-[10px] font-bold transform rotate-3 shadow-sm font-sans">NO. 2026-Soul</div>
                                    <div className="space-y-4 text-left">
                                        <h4 className="text-[11px] font-bold border-b pb-2 text-left font-sans italic">叙事基因分析报告 / ARCHIVE</h4>
                                        <div className="space-y-3 text-[10px] font-sans">
                                            <div className="flex justify-between items-center"><span>感性/意志</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#e8ed2a]" style={{width:'85%'}}></div></div></div>
                                            <div className="flex justify-between items-center"><span>理性/逻辑</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-[#35afcb]" style={{width:'40%'}}></div></div></div>
                                            <div className="flex justify-between items-center"><span>自由/反叛</span><div className="w-24 h-1 bg-gray-100"><div className="h-full bg-black" style={{width:'70%'}}></div></div></div>
                                        </div>
                                    </div>
                                    <div className="aspect-square w-full max-w-[200px] mx-auto">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                </div>

                                <div className="relative p-12 bg-white border border-[#dcd8cf] text-center shadow-sm">
                                    <p className="text-xl leading-relaxed mb-6 font-medium text-center"><span className="highlight-yellow">{result.quote}</span></p>
                                    <div className="text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold text-center font-sans">— {result.quoteSource} —</div>
                                </div>

                                <div className="space-y-10 px-2 text-left">
                                    <section className="space-y-4">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans text-left">灵魂本色 / THE SELF</h4>
                                        <div className="bg-white p-6 border-l-4 border-[#35afcb] space-y-5">
                                            <div>
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1">文学原型界定</span>
                                                <p className="text-[13px] leading-relaxed text-[#6d6b64] italic">“{result.identity}”</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1">精神症候解剖 (Symptom)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.symptom}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1">叙事驱动力 (Drive)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.drive}</p>
                                            </div>
                                            <div className="border-t border-gray-50 pt-4">
                                                <span className="text-[10px] font-bold text-gray-400 block mb-1">对抗姿态 (Confrontation)</span>
                                                <p className="text-[13px] leading-relaxed font-light">{result.confrontation}</p>
                                            </div>
                                        </div>
                                    </section>
                                    
                                    <section className="space-y-4 text-left">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 font-sans">阴影与盲区 / THE SHADOW</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
                                            <div className="p-4 bg-red-50 border border-red-100 rounded text-left">
                                                <div className="font-bold mb-1 font-sans">主导焦虑 (Anxiety)</div>
                                                <div className="opacity-70 font-sans">{result.anxiety}</div>
                                            </div>
                                            <div className="p-4 bg-gray-50 border border-gray-100 rounded text-left">
                                                <div className="font-bold mb-1 font-sans">阴影面 (Shadow)</div>
                                                <div className="opacity-70 font-sans">{result.shadow}</div>
                                            </div>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <h4 className="text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 font-sans text-left">思想进阶书单推荐</h4>
                                        <div className="grid gap-4">
                                            {result.books && result.books.map(function(book, i){
                                                return (
                                                    <div key={i} className="bg-white p-6 border border-[#dcd8cf] relative group shadow-sm text-left">
                                                        <h5 className="text-[15px] font-bold mb-1 font-sans">{book.title}</h5>
                                                        <p className="text-[10px] text-[#a4c29b] font-bold mb-2 uppercase font-sans">作者: {book.author}</p>
                                                        <p className="text-xs text-[#6d6b64] italic leading-relaxed opacity-80 font-sans">{book.desc}</p>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <div className="pt-8 space-y-4 text-center px-4">
                                <button onClick={saveAsImage} disabled={isSaving} className="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.5em] flex items-center justify-center gap-3 shadow-xl active:bg-gray-800 disabled:opacity-50 transition-all font-sans">{isSaving ? "生成高阶报告图片中..." : "保存灵魂手稿报告 / SAVE REPORT"}</button>
                                <button onClick={handleRestart} className="w-full py-5 border border-[#3a3833] text-[11px] font-bold uppercase tracking-[0.5em] hover:bg-[#3a3833] hover:text-white transition-all font-sans">再次重启叙事</button>
                            </div>
                        </div>
                    )}
                    <footer className="mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4">
                        <p className="text-[10px] tracking-[0.6em] uppercase text-[#3a3833] font-bold opacity-60 font-sans">© 2026 CURATED BY @云树CLOUDTREE</p>
                    </footer>
                </div>
            );
        }

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
